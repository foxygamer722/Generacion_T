const memoryCache = new Map();
const photoCache = new Map();

/* -------------------------------------------------------------------------
   FOTOS REALES — Wikipedia (API REST, sin necesidad de API key, con CORS).
   1) Búsqueda de texto libre para encontrar el artículo más relevante.
   2) Resumen del artículo, de donde se extrae la imagen principal.
   Si no hay coincidencia o falla la red, devolvemos null y el llamador
   recurre al retrato holográfico generativo como respaldo.
   ------------------------------------------------------------------------- */
async function fetchWikiPhoto(query) {
  if (!query) return null;
  const cacheKey = query.toLowerCase();
  if (photoCache.has(cacheKey)) return photoCache.get(cacheKey);

  try {
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
    const searchRes = await fetchWithTimeout(searchUrl, 7000);
    const title = searchRes?.query?.search?.[0]?.title;
    if (!title) {
      photoCache.set(cacheKey, null);
      return null;
    }
    const summaryUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    const summaryRes = await fetchWithTimeout(summaryUrl, 7000);
    // Preferimos la imagen original (más nítida) sobre el thumbnail chico.
    // Muchas imágenes de personajes de Star Wars en Wikipedia son material
    // de uso restringido y por eso Wikipedia las sirve deliberadamente en
    // baja resolución; si la única opción disponible es muy chica, mejor
    // descartarla y usar el holograma en vez de una foto borrosa o estirada.
    const candidate = summaryRes?.originalimage?.width >= 280
      ? summaryRes.originalimage
      : summaryRes?.thumbnail?.width >= 280
      ? summaryRes.thumbnail
      : null;
    const photoUrl = candidate?.source || null;
    photoCache.set(cacheKey, photoUrl);
    return photoUrl;
  } catch (e) {
    photoCache.set(cacheKey, null);
    return null;
  }
}

function useEntityPhoto(query) {
  const [state, setState] = useState({ status: "idle", url: null });

  useEffect(() => {
    if (!query) {
      setState({ status: "empty", url: null });
      return;
    }
    let cancelled = false;
    setState({ status: "loading", url: null });
    fetchWikiPhoto(query)
      .then((url) => {
        if (cancelled) return;
        setState(url ? { status: "success", url } : { status: "empty", url: null });
      })
      .catch(() => {
        if (cancelled) return;
        setState({ status: "error", url: null });
      });
    return () => { cancelled = true; };
  }, [query]);

  return state;
}

async function fetchWithTimeout(url, ms = 9000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(id);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

async function archiveFetch(path) {
  const cacheKey = path;
  if (memoryCache.has(cacheKey)) return memoryCache.get(cacheKey);

  let lastErr = null;
  // Intento primario: swapi.tech
  try {
    const data = await fetchWithTimeout(`${API_BASE}${path}`);
    const normalized = normalizeTechResponse(data);
    memoryCache.set(cacheKey, normalized);
    return normalized;
  } catch (e) {
    lastErr = e;
  }
  // Fallback: swapi.info (estructura clásica swapi.dev)
  try {
    const altPath = path.replace(/\?.*$/, "");
    const data = await fetchWithTimeout(`${FALLBACK_BASE}${altPath}`);
    const normalized = normalizeInfoResponse(data, path);
    memoryCache.set(cacheKey, normalized);
    return normalized;
  } catch (e2) {
    lastErr = e2;
  }
  throw lastErr || new Error("No fue posible contactar los Archivos.");
}

// swapi.tech envuelve todo en { message, result: { uid, properties } } o
// { message, results: [{ uid, properties }] }
function normalizeTechResponse(data) {
  if (data.result) {
    if (Array.isArray(data.result)) {
      return { list: data.result.map(flattenAnyItem), total: data.total_records ?? data.result.length };
    }
    return { item: flattenAnyItem(data.result) };
  }
  if (data.results) {
    return {
      list: data.results.map(flattenAnyItem),
      total: data.total_records ?? data.results.length,
      next: data.next,
      previous: data.previous,
    };
  }
  return data;
}
// Distintos hosts (y distintos endpoints del mismo host) devuelven el
// nombre/título a veces en el nivel superior y a veces anidado bajo
// "properties". flattenAnyItem cubre ambos casos sin asumir una forma fija,
// para que el nombre nunca se pierda sea cual sea el origen de los datos.
function flattenAnyItem(raw) {
  if (!raw) return null;
  const props = raw.properties || {};
  const merged = { ...props, ...raw };
  delete merged.properties;
  merged.name = raw.name || props.name || merged.name || null;
  merged.title = raw.title || props.title || merged.title || null;
  merged.url = raw.url || props.url || merged.url || null;
  merged.uid = raw.uid || merged.uid || extractIdFromUrl(merged.url);
  merged._id = merged.uid;
  return merged;
}

// swapi.info devuelve arrays planos sin paginar, o un objeto único por id
function normalizeInfoResponse(data, originalPath) {
  const idMatch = originalPath.match(/\/(\d+)\/?$/);
  if (Array.isArray(data)) {
    return { list: data.map(flattenAnyItem), total: data.length };
  }
  const withId = idMatch ? { ...data, uid: data.uid || idMatch[1] } : data;
  return { item: flattenAnyItem(withId) };
}
function extractIdFromUrl(url) {
  if (!url) return null;
  const m = url.match(/\/(\d+)\/?$/);
  return m ? m[1] : null;
}

function idsFromRefs(refs) {
  if (!refs) return [];
  return refs.map((r) => {
    if (typeof r === "string") return extractIdFromUrl(r);
    if (r && r.uid) return r.uid;
    return null;
  }).filter(Boolean);
}

/* -------------------------------------------------------------------------
   HOOK: carga de listado por categoría (con paginación simple)
   ------------------------------------------------------------------------- */
function useCategoryList(endpoint, page, retryToken) {
  const [state, setState] = useState({ status: "idle", data: null, error: null });

  useEffect(() => {
    if (!endpoint) return;
    let cancelled = false;
    setState({ status: "loading", data: null, error: null });

    archiveFetch(`/${endpoint}/?page=${page}&limit=24`)
      .then((res) => {
        if (cancelled) return;
        setState({ status: "success", data: res, error: null });
      })
      .catch((err) => {
        if (cancelled) return;
        setState({ status: "error", data: null, error: err.message || "Error desconocido" });
      });

    return () => { cancelled = true; };
  }, [endpoint, page, retryToken]);

  return state;
}

function useEntity(endpoint, uid) {
  const [state, setState] = useState({ status: "idle", data: null, error: null });

  const reload = useCallback(() => {
    if (!endpoint || !uid) return;
    let cancelled = false;
    setState({ status: "loading", data: null, error: null });

    archiveFetch(`/${endpoint}/${uid}`)
      .then((res) => {
        if (cancelled) return;
        const item = res.item || (res.list && res.list[0]);
        if (!item) throw new Error("Registro no encontrado en los Archivos.");
        setState({ status: "success", data: item, error: null });
      })
      .catch((err) => {
        if (cancelled) return;
        setState({ status: "error", data: null, error: err.message || "Error desconocido" });
      });

    return () => { cancelled = true; };
  }, [endpoint, uid]);

  useEffect(() => { const cleanup = reload(); return cleanup; }, [reload]);

  return { ...state, reload };
}

// Hash determinístico simple para derivar tono/ángulo a partir de un texto.
function hashSeed(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = (h << 5) - h + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

const HOLO_ICONS = {
  people: Users, planets: Globe2, starships: Rocket, vehicles: Rocket,
  species: Dna, films: Clapperboard,
};

/**
 * SWAPI no provee imágenes. En vez de simular fotos reales con un
 * placeholder genérico (lo que podría confundirse con material oficial),
 * renderizamos un retrato holográfico generativo: un patrón determinístico
 * derivado del nombre de la entidad, coherente con la estética de visor/HUD
 * del archivo, y que deja claro que es una representación, no una imagen real.
 */
function EntityImage({ query, alt, shape = "wide", catKey }) {
  const { status, url } = useEntityPhoto(query);
  const [imgFailed, setImgFailed] = useState(false);
  const showPhoto = status === "success" && url && !imgFailed;

  const seed = hashSeed(query || alt || "star-wars");
  const hueA = seed % 360;
  const hueB = (hueA + 40 + (seed % 60)) % 360;
  const angle = seed % 360;
  const Icon = HOLO_ICONS[catKey] || Sparkles;

  let tagText = "REPRESENTACIÓN HOLOGRÁFICA";
  if (showPhoto) tagText = "FUENTE: WIKIPEDIA";
  else if (status === "loading") tagText = "ESCANEANDO HOLOCRÓN...";

  return (
    <div
      className={`entity-image entity-image-${shape}`}
      style={{
        background: `linear-gradient(${angle}deg, hsl(${hueA} 45% 12%) 0%, hsl(${hueB} 35% 8%) 100%)`,
      }}
      role="img"
      aria-label={showPhoto ? `Fotografía de referencia de ${alt || "entidad"}` : `Retrato holográfico de ${alt || "entidad"}`}
    >
      {showPhoto ? (
        <img
          src={url}
          alt={alt || ""}
          className="entity-image-photo"
          loading="lazy"
          onError={() => setImgFailed(true)}
        />
      ) : (
        <>
          <div className="entity-image-grid" />

function subtitleFor(catKey, item) {
  switch (catKey) {
    case "people": return [item.birth_year && `nac. ${item.birth_year}`, item.gender].filter(Boolean).join(" · ");
    case "planets": return [item.climate, item.terrain].filter(Boolean).join(" · ");
    case "starships": return item.starship_class || item.model;
    case "vehicles": return item.vehicle_class || item.model;
    case "species": return item.classification;
    case "films": return item.release_date ? `estreno ${item.release_date}` : `episodio ${item.episode_id}`;
    default: return "";
  }
}
function imageQueryFor(catKey, item) {
  if (catKey === "films") return FILM_BACKDROPS[item.episode_id] || `Star Wars ${item.title}`;
  const base = item.name || item.title || "";
  switch (catKey) {
    case "people": return `Star Wars ${base} character`;
    case "planets": return `Star Wars planet ${base}`;
    case "starships": return `Star Wars starship ${base}`;
    case "vehicles": return `Star Wars vehicle ${base}`;
    case "species": return `Star Wars species ${base}`;
    default: return `Star Wars ${base}`;
  }
}

function EntityDetail({ catKey, uid, onNavigate, onBack }) {
  const catDef = CATEGORY_DEFS.find((c) => c.key === catKey);
  const { status, data, error, reload } = useEntity(catDef.endpoint, uid);
  const [relationsCache, setRelationsCache] = useState({});

  // Carga perezosa de entidades relacionadas (para mostrar nombres en vez de solo IDs)
  useEffect(() => {
    if (status !== "success" || !data) return;
    const relations = RELATION_FIELDS[catKey] || [];
    relations.forEach(async (rel) => {
      const raw = data[rel.field];
      if (!raw) return;
      const refs = Array.isArray(raw) ? raw : [raw];
      const ids = idsFromRefs(refs).slice(0, 12);
      for (const id of ids) {
        const cacheKey = `${rel.target}-${id}`;
        if (relationsCache[cacheKey]) continue;
        try {
          const res = await archiveFetch(`/${rel.target}/${id}`);
          const item = res.item || (res.list && res.list[0]);
          if (item) {
            setRelationsCache((prev) => ({ ...prev, [cacheKey]: item }));
          }
        } catch {
          setRelationsCache((prev) => ({ ...prev, [cacheKey]: { name: "registro no disponible", _failed: true } }));
        }
      }
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [status, data, catKey]);

  if (status === "loading" || status === "idle") {
    return (
      <div className="section-block">
        <button className="back-btn" onClick={onBack}><ArrowLeft size={14} /> volver</button>
        <ScanLoader label="Descifrando registro del holocrón..." />
      </div>
    );
  }
  if (status === "error") {
    return (
      <div className="section-block">
        <button className="back-btn" onClick={onBack}><ArrowLeft size={14} /> volver</button>
        <ErrorPanel message={error} onRetry={reload} />
      </div>
    );
  }

  const name = data.name || data.title;
  const fields = (DISPLAY_ORDER[catKey] || []).filter((f) => data[f] !== undefined && data[f] !== null && data[f] !== "");
  const relations = RELATION_FIELDS[catKey] || [];

  return (
    <div className="section-block entity-detail">
      <button className="back-btn" onClick={onBack}><ArrowLeft size={14} /> volver</button>

      <div className="detail-hero">
        <CornerFrame />
        <EntityImage query={imageQueryFor(catKey, data)} alt={name} shape="wide" catKey={catKey} />
        <div className="detail-hero-overlay">
          <span className="detail-kicker">{catDef.label.toUpperCase()} · REGISTRO #{uid}</span>
          <h1>{name}</h1>
          {catKey === "films" && data.episode_id && <p className="detail-episode">Episodio {data.episode_id}</p>}
        </div>
      </div>

      {data.opening_crawl && (
        <div className="crawl-box">
          <h3>Texto de apertura</h3>
          <p className="crawl-text">{data.opening_crawl}</p>
        </div>
      )}

      {fields.length > 0 && (
        <div className="stat-grid">
          {fields.map((f) => (
            <div className="stat-cell" key={f}>
              <span className="stat-label">{FIELD_LABELS[f] || f}</span>
              <span className="stat-value">{formatValue(data[f])}</span>
            </div>
          ))}
        </div>
      )}

      {relations.map((rel) => {
        const raw = data[rel.field];
        if (!raw) return null;
        const refs = Array.isArray(raw) ? raw : [raw];
        const ids = idsFromRefs(refs);
        if (ids.length === 0) return null;
        return (
          <div className="relation-block" key={rel.field}>
            <h3>{rel.label}</h3>
            <div className="relation-chips">
              {ids.map((id) => {
                const cacheKey = `${rel.target}-${id}`;
                const ref = relationsCache[cacheKey];
                const label = ref ? (ref.name || ref.title) : "...";
                const targetDef = CATEGORY_DEFS.find((c) => c.key === rel.target);
                return (
                  <button
                    key={id}
                    className="relation-chip"
                    disabled={!ref || ref._failed}
                    onClick={() => onNavigate(rel.target, id)}
                    style={{ "--pill-color": targetDef?.color }}
                  >
                    {!ref && <Loader2 size={11} className="spin" />}
                    {label}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function formatValue(v) {
  if (Array.isArray(v)) return v.join(", ");
  if (typeof v === "string" && /^\d+$/.test(v) && v.length > 3) {
    return Number(v).toLocaleString("es-AR");
  }
  return String(v);
}

/* ---- Búsqueda global ---- */
function SearchResultsView({ query, onOpenEntity }) {
  const [status, setStatus] = useState("loading");
  const [results, setResults] = useState([]);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    setStatus("loading");
    const endpoints = ["people", "planets", "starships", "vehicles", "species", "films"];

    Promise.allSettled(
      endpoints.map((ep) => archiveFetch(`/${ep}/?name=${encodeURIComponent(query)}`))
    ).then((settled) => {
      if (cancelled) return;
      const merged = [];
      settled.forEach((res, i) => {
        if (res.status !== "fulfilled") return;
        const list = res.value.list || (res.value.item ? [res.value.item] : []);
        list.forEach((item) => {
          const matchesName = (item.name || item.title || "").toLowerCase().includes(query.toLowerCase());
          if (matchesName) merged.push({ catKey: endpoints[i], item });
        });
      });
      if (merged.length === 0 && settled.every((s) => s.status === "rejected")) {
        setError("No se pudo contactar el archivo para realizar la búsqueda.");
        setStatus("error");
      } else {
        setResults(merged);
        setStatus("success");
      }
    });

    return () => { cancelled = true; };
  }, [query]);

  return (
    <div className="section-block">
      <h2 className="search-results-title">Resultados para «{query}»</h2>
      {status === "loading" && <ScanLoader label="Rastreando coincidencias en el archivo..." />}
      {status === "error" && <ErrorPanel message={error} />}
      {status === "success" && results.length === 0 && (
        <p className="empty-note">Ningún registro coincide. Probá con otro nombre, planeta o nave.</p>
      )}
      {status === "success" && results.length > 0 && (
        <div className="card-grid">
          {results.map(({ catKey, item }) => {
            const catDef = CATEGORY_DEFS.find((c) => c.key === catKey);
            return (
              <ListCard
                key={`${catKey}-${item.uid || item._id}`}
                title={item.name || item.title}
                subtitle={catDef.label}
                query={imageQueryFor(catKey, item)}
                catKey={catKey}
                onClick={() => onOpenEntity(catKey, item.uid || item._id, item)}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

   ========================================================================= */
export default function HoloArchive() {
  const [booted, setBooted] = useState(false);
  const [view, setView] = useState({ type: "home" });
  const [searchValue, setSearchValue] = useState("");
  const [online, setOnline] = useState(true);
  const historyRef = useRef([]);

  useEffect(() => {
    const goOnline = () => setOnline(true);
    const goOffline = () => setOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    setOnline(navigator.onLine);
    return () => {
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, []);

  const pushView = (next) => {
    historyRef.current.push(view);
    setView(next);
  };
  const goBack = () => {
    const prev = historyRef.current.pop();
    setView(prev || { type: "home" });
  };
  const goHome = () => {
    historyRef.current = [];
    setView({ type: "home" });
  };

  const handleSelectCategory = (key) => {
    if (key === "organizations") pushView({ type: "organizations" });
    else if (key === "series") pushView({ type: "series" });
    else if (key === "legends") pushView({ type: "legends" });
    else pushView({ type: "list", catKey: key });
  };

  const handleOpenEntity = (catKey, uid) => {
    pushView({ type: "detail", catKey, uid });
  };

  const handleSearch = (q) => {
    if (!q || !q.trim()) return;
    pushView({ type: "search", query: q.trim() });
  };

  if (!booted) {
    return (
      <ArchiveShell>
        <BootScreen onDone={() => setBooted(true)} />
      </ArchiveShell>
    );
  }

  return (
    <ArchiveShell>
      <TopBar
        onHome={goHome}
        onSearch={handleSearch}
        searchValue={searchValue}
        setSearchValue={setSearchValue}
        online={online}
      />
      <CategoryNav
        active={view.type === "list" ? view.catKey : view.type === "organizations" ? "organizations" : view.type === "series" ? "series" : view.type === "legends" ? "legends" : null}
        onSelect={handleSelectCategory}
      />
      <main className="archive-main">
        {!online && (
          <div className="offline-banner">
            <WifiOff size={14} /> Sin enlace activo — algunos registros podrían no cargar.
          </div>
        )}
        {view.type === "home" && <HomeView onSelect={handleSelectCategory} />}
        {view.type === "list" && (
          <ApiListView
            catDef={CATEGORY_DEFS.find((c) => c.key === view.catKey)}
            onOpenEntity={handleOpenEntity}
          />
        )}
        {view.type === "detail" && (
          <EntityDetail
            catKey={view.catKey}
            uid={view.uid}
            onNavigate={handleOpenEntity}
            onBack={goBack}
          />
        )}
        {view.type === "organizations" && <OrganizationsView />}
        {view.type === "series" && <SeriesView />}
        {view.type === "legends" && <LegendsView />}
        {view.type === "search" && (
          <SearchResultsView query={view.query} onOpenEntity={handleOpenEntity} />
        )}
      </main>
      <footer className="archive-footer">
        <p>
          Datos estructurados servidos por la API pública de Star Wars (swapi.tech, con respaldo en swapi.info).
          Contenido editorial de organizaciones, series y contexto Legends/Canon: curaduría propia, no oficial.
          Star Wars y todos los elementos relacionados son propiedad de Lucasfilm Ltd.
        </p>
      </footer>
    </ArchiveShell>
  );
}

function ArchiveShell({ children }) {
  return (
    <div className="archive-root">
      <style>{CSS}</style>
      <div className="starfield" aria-hidden="true" />
      {children}
    </div>
  );
}

/* =========================================================================
   ESTILOS
   ========================================================================= */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  --c-void: #0B0E14;
  --c-void-2: #0F1320;
  --c-steel: #1C2230;
  --c-steel-2: #262E40;
  --c-cyan: #5EE6D9;
  --c-amber: #E8A33D;
  --c-red: #C8453A;
  --c-parchment: #D8D4C4;

  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

.archive-root {
  position: relative;
  min-height: 100vh;
  background: radial-gradient(ellipse at top, var(--c-void-2) 0%, var(--c-void) 60%);
  color: var(--c-parchment);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.55;
  overflow-x: hidden;
}
.archive-root *, .archive-root *::before, .archive-root *::after { box-sizing: border-box; }

@media (prefers-reduced-motion: reduce) {
  .archive-root * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

.starfield {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(216,212,196,0.5), transparent),
    radial-gradient(1px 1px at 80% 10%, rgba(216,212,196,0.4), transparent),
    radial-gradient(1px 1px at 30% 70%, rgba(94,230,217,0.4), transparent),
    radial-gradient(1px 1px at 65% 85%, rgba(216,212,196,0.3), transparent),
    radial-gradient(1px 1px at 90% 60%, rgba(216,212,196,0.4), transparent),
    radial-gradient(1px 1px at 50% 40%, rgba(216,212,196,0.25), transparent);
  background-size: 100% 100%;
  opacity: 0.6;
}

/* ---------- Boot screen ---------- */
.boot-screen {
  position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--c-void); z-index: 2;
}
.boot-scanline {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: repeating-linear-gradient(to bottom, rgba(94,230,217,0.025) 0px, rgba(94,230,217,0.025) 1px, transparent 2px, transparent 4px);
}
.boot-content { position: relative; z-index: 2; width: min(560px, 90vw); text-align: center; }
.boot-emblem { color: var(--c-cyan); margin-bottom: 14px; filter: drop-shadow(0 0 12px rgba(94,230,217,0.5)); animation: pulse-glow 2.2s ease-in-out infinite; }
@keyframes pulse-glow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
.boot-title { font-family: var(--font-display); font-size: 2.1rem; letter-spacing: 0.18em; margin: 0; color: var(--c-parchment); text-shadow: 0 0 18px rgba(94,230,217,0.35); }
.boot-sub { color: var(--c-parchment-dim); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; margin: 6px 0 28px; }
.boot-log { text-align: left; min-height: 150px; font-size: 0.78rem; color: var(--c-cyan); }
.boot-line { margin-bottom: 6px; opacity: 0; animation: fade-in 0.3s ease forwards; }
@keyframes fade-in { to { opacity: 1; } }
.boot-caret { color: var(--c-amber); margin-right: 4px; }
.boot-cursor { color: var(--c-parchment); animation: blink 0.8s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
.boot-bar-track { margin-top: 22px; height: 3px; background: var(--c-steel); border-radius: 0; overflow: hidden; }
.boot-bar-fill { height: 100%; background: linear-gradient(90deg, var(--c-cyan), var(--c-amber)); transition: width 0.3s ease; }

/* ---------- Top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 18px;
  padding: 14px 28px;
  background: rgba(11,14,20,0.88);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--c-steel-2);
}
.brand { display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0; }
.brand-mark { color: var(--c-amber); font-size: 1rem; }
.brand-text { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.14em; color: var(--c-parchment); white-space: nowrap; }
.brand-accent { color: var(--c-cyan); }
.search-wrap { flex: 1; max-width: 480px; position: relative; display: flex; align-items: center; }
.search-wrap input {
  width: 100%; background: var(--c-steel); border: 1px solid var(--c-steel-2); color: var(--c-parchment);
  font-family: var(--font-mono); font-size: 0.82rem; padding: 9px 34px 9px 32px; border-radius: 2px;
  outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--c-cyan); }
.search-wrap input::placeholder { color: var(--c-parchment-dim); }
.search-icon { position: absolute; left: 10px; color: var(--c-parchment-dim); }
.search-clear { position: absolute; right: 8px; background: none; border: none; color: var(--c-parchment-dim); cursor: pointer; display: flex; }
.net-indicator { display: flex; align-items: center; padding: 6px; border-radius: 2px; }
.net-on { color: var(--c-cyan); }
.net-off { color: var(--c-red); }

/* ---------- Category nav ---------- */
.cat-nav {
  display: flex; gap: 8px; padding: 12px 28px; overflow-x: auto;
  border-bottom: 1px solid var(--c-steel-2); position: sticky; top: 61px; z-index: 19;
  background: rgba(11,14,20,0.82); backdrop-filter: blur(6px);
  scrollbar-width: thin;
}
.cat-pill {
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
  padding: 7px 13px; border-radius: 2px; border: 1px solid var(--c-steel-2);
  background: var(--c-steel); color: var(--c-parchment-dim); cursor: pointer;
  font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.03em;

}
.cat-pill:hover { border-color: var(--pill-color); color: var(--c-parchment); }
.cat-pill-active { background: var(--c-steel-2); border-color: var(--pill-color); color: var(--c-parchment); box-shadow: 0 0 0 1px var(--pill-color) inset; }

/* ---------- Layout ---------- */
.archive-main { position: relative; z-index: 2; max-width: 1180px; margin: 0 auto; padding: 32px 28px 64px; }
.offline-banner {
  display: flex; align-items: center; gap: 8px; background: rgba(200,69,58,0.12);
  border: 1px solid var(--c-red); color: var(--c-red); padding: 8px 14px; border-radius: 2px;
  font-size: 0.75rem; margin-bottom: 20px;
}

/* ---------- Corner frame (signature element) ---------- */
.corner { position: absolute; width: 12px; height: 12px; pointer-events: none; opacity: 0.7; }
.corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--c-cyan); border-left: 2px solid var(--c-cyan); }
.corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--c-cyan); border-right: 2px solid var(--c-cyan); }
.corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--c-cyan); border-left: 2px solid var(--c-cyan); }
.corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--c-cyan); border-right: 2px solid var(--c-cyan); }

/* ---------- Home ---------- */
.hero {
  position: relative; padding: 36px 30px; margin-bottom: 30px;
  background: linear-gradient(135deg, var(--c-steel) 0%, var(--c-void-2) 100%);
  border: 1px solid var(--c-steel-2); clip-path: polygon(0 0, 100% 0, 100% 92%, 96% 100%, 0 100%);
}
.hero-eyebrow { color: var(--c-amber); font-size: 0.68rem; letter-spacing: 0.16em; margin: 0 0 10px; }
.hero-title { font-family: var(--font-display); font-size: 2rem; margin: 0 0 14px; letter-spacing: 0.02em; }
.hero-desc { color: var(--c-parchment-dim); max-width: 640px; font-size: 0.85rem; margin: 0; }

.home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
.home-card {
  position: relative; text-align: left; background: var(--c-steel); border: 1px solid var(--c-steel-2);
  color: var(--c-parchment); padding: 22px 18px; cursor: pointer; display: flex; flex-direction: column; gap: 10px;
  clip-path: polygon(0 0, 100% 0, 100% 88%, 88% 100%, 0 100%);
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.home-card svg { color: var(--pill-color); }
.home-card:hover { transform: translateY(-2px); border-color: var(--pill-color); }
.home-card h3 { margin: 0; font-size: 0.95rem; font-weight: 600; }
.home-card-go { font-size: 0.68rem; color: var(--c-parchment-dim); display: flex; align-items: center; gap: 2px; }

/* ---------- Section header ---------- */
.section-header { margin-bottom: 18px; }
.section-title-row { display: flex; align-items: center; gap: 10px; }
.section-title-row h2 { font-family: var(--font-display); font-size: 1.3rem; margin: 0; letter-spacing: 0.04em; }
.section-intro { color: var(--c-parchment-dim); font-size: 0.83rem; max-width: 720px; margin: 0 0 22px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--c-steel-2);
  color: var(--c-parchment-dim); padding: 6px 12px; border-radius: 2px; cursor: pointer; font-family: var(--font-mono);
  font-size: 0.72rem; margin-bottom: 16px; transition: border-color 0.15s, color 0.15s;
}
.back-btn:hover { border-color: var(--c-cyan); color: var(--c-parchment); }

/* ---------- Cards / grids ---------- */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.list-card {
  position: relative; background: var(--c-steel); border: 1px solid var(--c-steel-2); text-align: left;
  color: var(--c-parchment); cursor: pointer; padding: 0; overflow: hidden; display: flex; flex-direction: column;
  transition: border-color 0.15s ease, transform 0.15s ease;
}
.list-card:hover { border-color: var(--c-cyan); transform: translateY(-2px); }
.list-card-static { cursor: default; }
.list-card-static:hover { transform: none; border-color: var(--c-steel-2); }
.list-card-body { padding: 12px 14px 16px; }
.list-card-body h4 { margin: 0 0 4px; font-size: 0.88rem; }
.list-card-body p { margin: 0; font-size: 0.72rem; color: var(--c-parchment-dim); }
.series-desc { margin-top: 6px !important; font-size: 0.72rem; line-height: 1.5; }
.canon-badge {
  display: inline-block; margin-top: 8px; font-size: 0.62rem; letter-spacing: 0.1em;
  color: var(--c-cyan); border: 1px solid var(--c-cyan); padding: 2px 6px; border-radius: 2px;
}

.entity-image { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; z-index: 0; isolation: isolate; }
.entity-image-square { aspect-ratio: 1 / 1; }
.entity-image-wide { aspect-ratio: 16 / 7; }
.entity-image-rings {
  position: relative; z-index: 2; width: 64%; height: 64%; max-width: 140px;
  border: 1px solid; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  opacity: 0.9;
}
.entity-image-rings::before {
  content: ""; position: absolute; inset: -14px; border: 1px dashed currentColor; border-radius: 50%; opacity: 0.35;
}
.entity-image-tag {
  position: absolute; bottom: 6px; left: 0; right: 0; text-align: center; z-index: 4;
  font-size: 0.5rem; letter-spacing: 0.08em; color: var(--c-parchment-dim); opacity: 0.6;
}
.entity-image-photo {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2;
  filter: saturate(0.92) contrast(1.05) brightness(0.88);
}
.entity-image-overlay {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: linear-gradient(to top, rgba(11,14,20,0.92) 0%, rgba(11,14,20,0.18) 55%, transparent 80%);
}
.entity-image-grid {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image: linear-gradient(rgba(94,230,217,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(94,230,217,0.08) 1px, transparent 1px);
  background-size: 22px 22px;
}

.pager { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 26px; }
.pager button {
  background: var(--c-steel); border: 1px solid var(--c-steel-2); color: var(--c-parchment); padding: 7px 14px;
  border-radius: 2px; cursor: pointer; font-family: var(--font-mono); font-size: 0.74rem;
}
.pager button:disabled { opacity: 0.3; cursor: not-allowed; }
.pager span { color: var(--c-parchment-dim); font-size: 0.74rem; }

/* ---------- Loaders / errors ---------- */
.scan-loader { padding: 50px 0; text-align: center; color: var(--c-parchment-dim); }
.scan-loader-bar { width: min(360px, 80%); height: 2px; background: var(--c-steel); margin: 0 auto 16px; position: relative; overflow: hidden; }
.scan-loader-sweep { position: absolute; top: 0; left: -40%; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, var(--c-cyan), transparent); animation: sweep 1.3s linear infinite; }
@keyframes sweep { to { left: 100%; } }
.scan-loader p { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.78rem; }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-panel {
  position: relative; text-align: center; padding: 42px 24px; background: rgba(200,69,58,0.06);
  border: 1px solid rgba(200,69,58,0.4); color: var(--c-red); max-width: 480px; margin: 20px auto;
}
.error-panel h3 { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.08em; margin: 14px 0 8px; }
.error-detail { color: var(--c-parchment); font-size: 0.82rem; margin: 0 0 6px; }
.error-hint { color: var(--c-parchment-dim); font-size: 0.74rem; margin: 0 0 18px; }
.btn-retry {
  display: inline-flex; align-items: center; gap: 6px; background: var(--c-red); color: var(--c-void);
  border: none; padding: 9px 18px; border-radius: 2px; cursor: pointer; font-family: var(--font-mono);
  font-size: 0.74rem; font-weight: 600;
}

/* ---------- Entity detail ---------- */
.detail-hero { position: relative; margin-bottom: 24px; border: 1px solid var(--c-steel-2); }
.detail-hero-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 22px;
  background: linear-gradient(to top, rgba(11,14,20,0.95), transparent);
}
.detail-kicker { font-size: 0.65rem; letter-spacing: 0.14em; color: var(--c-amber); }
.detail-hero-overlay h1 { font-family: var(--font-display); font-size: 1.7rem; margin: 4px 0 0; }
.detail-episode { color: var(--c-parchment-dim); font-size: 0.78rem; margin: 4px 0 0; }

.crawl-box { background: var(--c-steel); border-left: 2px solid var(--c-amber); padding: 16px 20px; margin-bottom: 24px; }
.crawl-box h3 { margin: 0 0 8px; font-size: 0.8rem; color: var(--c-amber); letter-spacing: 0.06em; }
.crawl-text { white-space: pre-line; font-size: 0.8rem; color: var(--c-parchment-dim); margin: 0; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1px; background: var(--c-steel-2); margin-bottom: 28px; }
.stat-cell { background: var(--c-void-2); padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
.stat-label { font-size: 0.62rem; color: var(--c-parchment-dim); letter-spacing: 0.06em; text-transform: uppercase; }
.stat-value { font-size: 0.85rem; color: var(--c-parchment); }

.relation-block { margin-bottom: 22px; }
.relation-block h3 { font-size: 0.78rem; color: var(--c-parchment-dim); letter-spacing: 0.06em; text-transform: uppercase; margin: 0 0 10px; }
.relation-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.relation-chip {
  display: flex; align-items: center; gap: 6px; background: var(--c-steel); border: 1px solid var(--pill-color, var(--c-steel-2));
  color: var(--c-parchment); padding: 6px 12px; border-radius: 2px; cursor: pointer; font-family: var(--font-mono); font-size: 0.74rem;
}
.relation-chip:disabled { cursor: default; opacity: 0.6; }
.relation-chip:not(:disabled):hover { background: var(--c-steel-2); }

/* ---------- Organizations ---------- */
.org-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
.org-card { position: relative; background: var(--c-steel); border: 1px solid var(--c-steel-2); overflow: hidden; }
.org-dark { border-left: 3px solid var(--c-red); }
.org-light { border-left: 3px solid var(--c-cyan); }
.org-neutral { border-left: 3px solid var(--c-amber); }
.org-card-body { padding: 16px 18px 18px; }
.org-card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.org-card-head h3 { margin: 0; font-size: 1rem; }
.org-align { font-size: 0.6rem; letter-spacing: 0.1em; color: var(--c-parchment-dim); border: 1px solid var(--c-steel-2); padding: 2px 7px; border-radius: 2px; white-space: nowrap; }
.org-era { font-size: 0.68rem; color: var(--c-amber); margin: 6px 0 10px; }
.org-summary { font-size: 0.78rem; color: var(--c-parchment-dim); margin: 0 0 12px; }
.org-notable { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 0.66rem; background: var(--c-void-2); border: 1px solid var(--c-steel-2); padding: 3px 8px; border-radius: 2px; color: var(--c-parchment-dim); }
.tag-cyan { border-color: var(--c-cyan); color: var(--c-cyan); }
.tag-amber { border-color: var(--c-amber); color: var(--c-amber); }

/* ---------- Legends vs Canon ---------- */
.legends-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
@media (max-width: 700px) { .legends-grid { grid-template-columns: 1fr; } }
.legends-col { position: relative; padding: 24px; background: var(--c-steel); border: 1px solid var(--c-steel-2); }
.legends-canon { border-top: 3px solid var(--c-cyan); }
.legends-legends { border-top: 3px solid var(--c-amber); }
.legends-col h3 { font-family: var(--font-display); font-size: 1.1rem; margin: 0 0 12px; letter-spacing: 0.05em; }
.legends-col p { font-size: 0.82rem; color: var(--c-parchment-dim); margin: 0 0 16px; }
.legends-examples { display: flex; flex-wrap: wrap; gap: 6px; }

/* ---------- Search ---------- */
.search-results-title { font-family: var(--font-display); font-size: 1.2rem; margin: 0 0 20px; }
.empty-note { color: var(--c-parchment-dim); font-size: 0.85rem; }

/* ---------- Footer ---------- */
.archive-footer { position: relative; z-index: 2; border-top: 1px solid var(--c-steel-2); padding: 20px 28px; text-align: center; }
.archive-footer p { max-width: 720px; margin: 0 auto; font-size: 0.65rem; color: var(--c-parchment-dim); line-height: 1.6; }

/* ---------- Focus visibility ---------- */
.archive-root button:focus-visible, .archive-root input:focus-visible {
  outline: 2px solid var(--c-cyan); outline-offset: 2px;
}

/* ---------- Scrollbar ---------- */
.archive-root ::-webkit-scrollbar { height: 6px; width: 8px; }
.archive-root ::-webkit-scrollbar-thumb { background: var(--c-steel-2); }

@media (max-width: 640px) {
  .topbar { flex-wrap: wrap; padding: 12px 16px; }
  .cat-nav { top: 0; padding: 10px 16px; }
  .archive-main { padding: 24px 16px 48px; }
  .hero-title { font-size: 1.5rem; }
}
`;
