<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Wars Wiki — Holocron Database</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFE81A;
    --gold-dim: #CCC015;
    --gold-dark: #8A7E00;
    --red: #D62828;
    --blue: #1E90FF;
    --blue-dim: #0060CC;
    --cyan: #00D4FF;
    --cyan-dim: #0099CC;
    --bg-deep: #020408;
    --bg-dark: #060C14;
    --bg-card: #0A1420;
    --bg-card2: #0D1B2A;
    --bg-panel: #080F1A;
    --border: rgba(255,232,26,0.18);
    --border-bright: rgba(255,232,26,0.45);
    --text: #C8D8E8;
    --text-dim: #6A7E92;
    --text-bright: #E8F0F8;
    --saber-blue: #4FC3F7;
    --saber-red: #FF5252;
    --saber-green: #69F0AE;
    --saber-purple: #CE93D8;
    --font-title: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --glow: 0 0 20px rgba(255,232,26,0.3), 0 0 40px rgba(255,232,26,0.1);
    --glow-blue: 0 0 20px rgba(0,212,255,0.3);
    --glow-red: 0 0 20px rgba(214,40,40,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARFIELD BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 88%, rgba(255,232,26,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 25%, rgba(200,220,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 65% 55%, rgba(255,200,200,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* SCANLINE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,232,26,0.04) 0%, transparent 100%);
  }

  .header-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.7;
  }

  header h1 {
    font-family: var(--font-title);
    font-size: clamp(28px, 6vw, 64px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: var(--glow);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .header-sub {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--cyan-dim);
    text-transform: uppercase;
    opacity: 0.6;
  }

  .crawl-line {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.5rem auto;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
    padding: 10px 16px;
    background: rgba(2,4,8,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .nav-btn {
    font-family: var(--font-title);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 14px;
    background: transparent;
    border: 1px solid rgba(255,232,26,0.2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.25s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .nav-btn:hover, .nav-btn.active {
    background: rgba(255,232,26,0.12);
    border-color: var(--gold);
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255,232,26,0.6);
    box-shadow: 0 0 15px rgba(255,232,26,0.15);
  }

  /* ── SEARCH ── */
  .search-bar {
    position: relative;
    z-index: 10;
    max-width: 640px;
    margin: 2rem auto 0;
    padding: 0 1.5rem;
  }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-wrap::before {
    content: '⟨ HOLOCRON SEARCH ⟩';
    position: absolute;
    top: -18px;
    left: 0;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold-dark);
  }

  .search-input {
    width: 100%;
    background: rgba(10,20,32,0.8);
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    padding: 12px 48px 12px 20px;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--cyan);
    outline: none;
    transition: all 0.3s;
  }

  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(255,232,26,0.15), inset 0 0 10px rgba(255,232,26,0.05);
    background: rgba(10,20,32,0.95);
  }

  .search-input::placeholder { color: var(--text-dim); opacity: 0.5; }

  .search-icon {
    position: absolute;
    right: 14px;
    font-size: 18px;
    color: var(--gold);
    cursor: pointer;
    opacity: 0.7;
  }

  /* ── MAIN CONTENT ── */
  main {
    position: relative;
    z-index: 5;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── SECTION TITLE ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-family: var(--font-title);
    font-size: clamp(14px, 3vw, 22px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .section-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    padding: 3px 10px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-bright), transparent);
  }

  /* ── GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* ── CARD ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: all 0.3s;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,232,26,0.03) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    border-color: var(--border-bright);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,232,26,0.08);
  }

  .card:hover::before, .card:hover::after { opacity: 1; }

  .card-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--bg-panel);
    filter: saturate(0.8) contrast(1.1);
  }

  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg-panel);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-img-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      linear-gradient(45deg, transparent 45%, rgba(255,232,26,0.03) 50%, transparent 55%),
      linear-gradient(-45deg, transparent 45%, rgba(0,212,255,0.03) 50%, transparent 55%);
    background-size: 20px 20px;
  }

  .card-icon {
    font-size: 48px;
    opacity: 0.15;
    filter: grayscale(1);
  }

  .card-body {
    padding: 16px;
  }

  .card-category {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--cyan-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .card-name {
    font-family: var(--font-title);
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 1px;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 3px 8px;
    border: 1px solid rgba(255,232,26,0.2);
    color: var(--gold-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .tag.blue { border-color: rgba(0,212,255,0.25); color: var(--cyan-dim); }
  .tag.red { border-color: rgba(214,40,40,0.3); color: #FF6B6B; }
  .tag.green { border-color: rgba(105,240,174,0.25); color: #69F0AE; }
  .tag.purple { border-color: rgba(206,147,216,0.25); color: var(--saber-purple); }

  /* ── CORNER DECORATIONS ── */
  .card-corner {
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.4;
    transition: opacity 0.3s;
  }
  .card:hover .card-corner { opacity: 0.8; }
  .card-corner.tl { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
  .card-corner.br { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg-card2);
    border: 1px solid var(--border-bright);
    max-width: 800px;
    width: 100%;
    margin: auto;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(255,232,26,0.1);
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header-img {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
    filter: saturate(0.7) contrast(1.15);
  }

  .modal-header-placeholder {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, var(--bg-panel) 0%, rgba(10,30,50,0.8) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .modal-header-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(255,232,26,0.02) 10px,
      rgba(255,232,26,0.02) 20px
    );
  }

  .modal-header-icon { font-size: 80px; opacity: 0.1; }

  .modal-title-bar {
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .modal-category {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .modal-title {
    font-family: var(--font-title);
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: var(--glow);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: var(--font-title);
  }

  .modal-close:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(214,40,40,0.1);
  }

  .modal-body {
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 600px) {
    .modal-body { grid-template-columns: 1fr; }
  }

  .modal-section {
    grid-column: 1 / -1;
  }

  .modal-section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(0,212,255,0.15);
  }

  .modal-desc {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-item {
    background: var(--bg-panel);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 10px 14px;
    position: relative;
  }

  .stat-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    opacity: 0.4;
  }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
  }

  .related-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .related-chip {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .related-chip:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(255,232,26,0.05);
  }

  /* ── LOADER ── */
  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5rem 2rem;
    gap: 20px;
  }

  .loader-ring {
    width: 50px;
    height: 50px;
    border: 2px solid rgba(255,232,26,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold-dim);
    text-transform: uppercase;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* ── ERROR ── */
  .error-box {
    background: rgba(214,40,40,0.08);
    border: 1px solid rgba(214,40,40,0.3);
    padding: 2rem;
    text-align: center;
    max-width: 500px;
    margin: 3rem auto;
  }

  .error-icon { font-size: 40px; margin-bottom: 12px; }

  .error-title {
    font-family: var(--font-title);
    font-size: 16px;
    color: var(--saber-red);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .error-msg {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .retry-btn {
    margin-top: 16px;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--saber-red);
    font-family: var(--font-title);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retry-btn:hover {
    background: rgba(214,40,40,0.15);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
  }

  .empty-icon { font-size: 52px; opacity: 0.2; margin-bottom: 16px; }

  .empty-text {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  /* ── PAGINATION ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 2.5rem;
    flex-wrap: wrap;
  }

  .page-btn {
    font-family: var(--font-title);
    font-size: 9px;
    letter-spacing: 2px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .page-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(255,232,26,0.05);
  }

  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-btn.current { border-color: var(--gold); color: var(--gold); background: rgba(255,232,26,0.1); }

  .page-info {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    padding: 0 8px;
  }

  /* ── CATEGORIES ROW ── */
  .categories-intro {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 3rem;
  }

  .cat-tile {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .cat-tile::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .cat-tile:hover { border-color: var(--border-bright); transform: translateY(-2px); }
  .cat-tile:hover::before { transform: scaleX(1); }

  .cat-icon { font-size: 28px; margin-bottom: 8px; display: block; }

  .cat-name {
    font-family: var(--font-title);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .cat-count {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
  }

  /* ── HOME HERO ── */
  .hero-lore {
    max-width: 680px;
    margin: 0 auto 3rem;

// ─── SWAPI FETCH ─────────────────────────────────────────────────────────────
async function apiFetch(url) {
  if (CACHE[url]) return CACHE[url];
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${r.statusText}`);
  const data = await r.json();
  CACHE[url] = data;
  return data;
}

async function fetchSection(section, page = 1, search = '') {
  let url = `${API}/${section}/?page=${page}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  return apiFetch(url);
}

function buildNav() {
  const nav = document.getElementById('main-nav');
  nav.innerHTML = CATEGORIES.map(c =>
    `<button class="nav-btn${c.key === currentSection ? ' active' : ''}" onclick="navigate('${c.key}')">${c.icon} ${c.label}</button>`
  ).join('');
}

function navigate(section) {
  currentSection = section;
  currentPage = 1;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  buildNav();
  const search = document.getElementById('search-area');
  const cat = CATEGORIES.find(c => c.key === section);
  search.style.display = cat && cat.search ? 'block' : 'none';
  renderSection(section);
}

  closeModal();

}

// ─── API SECTION (people, planets, ships, vehicles, species) ─────────────────
async function renderAPISection(section) {
  showLoader(`Consultando archivos: ${section.toUpperCase()}...`);
  try {
    const data = await fetchSection(section, currentPage, searchQuery);
    currentSectionData = data;
    const cat = CATEGORIES.find(c => c.key === section);
    const totalPages = Math.ceil(data.count / 10);

    const cards = data.results.map(item => buildCard(item, section)).join('');

    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="breadcrumb">HOLOCRÓN <span>▸</span> ${cat.label.toUpperCase()} <span>▸</span> PÁGINA ${currentPage}/${totalPages}</div>
      <div class="section-header">
        <div class="section-title">${cat.icon} ${cat.label}</div>
        <div class="section-count">${data.count} registros</div>
        <div class="section-line"></div>
      </div>
      ${searchQuery ? `<div class="highlight-bar">⟨ BÚSQUEDA: "${searchQuery}" — ${data.count} resultados encontrados ⟩</div>` : ''}
      ${data.results.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">🔭</div>
          <div class="empty-text">NO SE ENCONTRARON REGISTROS EN LOS ARCHIVOS</div>
        </div>
      ` : `
        <div class="cards-grid">${cards}</div>
        ${renderPagination(currentPage, totalPages)}
      `}
    `;
  } catch(e) { showError(e, section); }
}

function buildCard(item, section) {
  const info = getCardInfo(item, section);
  const imgHtml = info.image
    ? `<img class="card-img" src="${info.image}" alt="${info.name}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'card-img-placeholder\\'><span class=\\'card-icon\\'>${info.icon}</span></div>'">`
    : `<div class="card-img-placeholder"><span class="card-icon">${info.icon}</span></div>`;

  return `
    <div class="card animate-in" onclick="showDetail(${JSON.stringify(item).replace(/"/g,'&quot;')}, '${section}')">
      <div class="card-corner tl"></div>
      <div class="card-corner br"></div>
      ${imgHtml}
      <div class="card-body">
        <div class="card-category">${section.toUpperCase()}</div>
        <div class="card-name">${info.name}</div>
        <div class="card-desc">${info.desc}</div>
        <div class="card-meta">${info.tags.map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('')}</div>
      </div>
    </div>
  `;
}

function getCardInfo(item, section) {
  const icons = { people:'🧑‍🚀', planets:'🪐', starships:'🚀', vehicles:'🛸', species:'👁️' };
  const icon = icons[section] || '📄';
  let name, desc, tags = [], image = null;

  if (section === 'people') {
    name = item.name;
    image = EXTRA_INFO.people.getImage(name);
    desc = `${item.gender !== 'n/a' ? item.gender + ' · ' : ''}${item.birth_year !== 'unknown' ? 'Año ' + item.birth_year : ''} ${item.homeworld ? '· Planeta natal disponible' : ''}`;
    if (item.height !== 'unknown') tags.push({text: `${item.height}cm`, cls:''});
    if (item.mass !== 'unknown') tags.push({text: `${item.mass}kg`, cls:'blue'});
    if (item.eye_color !== 'unknown') tags.push({text: item.eye_color, cls:'green'});
    if (item.hair_color !== 'unknown' && item.hair_color !== 'n/a') tags.push({text: item.hair_color, cls:''});
  } else if (section === 'planets') {
    name = item.name;
    desc = `${item.climate !== 'unknown' ? 'Clima: ' + item.climate : 'Clima desconocido'} · ${item.terrain !== 'unknown' ? item.terrain : 'Terreno desconocido'}`;
    if (item.population !== 'unknown') tags.push({text: `Pop: ${parseInt(item.population).toLocaleString()}`, cls:''});
    if (item.diameter !== 'unknown') tags.push({text: `Ø ${item.diameter}km`, cls:'blue'});
    if (item.gravity !== 'unknown') tags.push({text: `G: ${item.gravity}`, cls:'green'});
  } else if (section === 'starships') {
    name = item.name;
    desc = `${item.starship_class} · ${item.manufacturer.split(',')[0]}`;
    if (item.crew !== 'unknown') tags.push({text: `Tripulación: ${item.crew}`, cls:''});
    if (item.hyperdrive_rating !== 'unknown') tags.push({text: `Hiperpropulsión: ${item.hyperdrive_rating}`, cls:'blue'});
    if (item.length !== 'unknown') tags.push({text: `${item.length}m`, cls:'green'});
    if (item.cost_in_credits !== 'unknown') tags.push({text: `${(parseInt(item.cost_in_credits)/1000000).toFixed(1)}M cr`, cls:'purple'});
  } else if (section === 'vehicles') {
    name = item.name;
    desc = `${item.vehicle_class} · ${item.manufacturer.split(',')[0]}`;
    if (item.crew !== 'unknown') tags.push({text: `Tripulación: ${item.crew}`, cls:''});
    if (item.max_atmosphering_speed !== 'unknown') tags.push({text: `${item.max_atmosphering_speed}km/h`, cls:'blue'});
    if (item.length !== 'unknown') tags.push({text: `${item.length}m`, cls:'green'});
  } else if (section === 'species') {
    name = item.name;
    desc = `${item.classification} · ${item.designation} · Origen: ${item.homeworld ? 'planeta conocido' : 'desconocido'}`;
    if (item.language !== 'unknown') tags.push({text: item.language, cls:''});
    if (item.average_lifespan !== 'unknown') tags.push({text: `Vida: ${item.average_lifespan} años`, cls:'blue'});
    if (item.average_height !== 'unknown') tags.push({text: `Alt: ${item.average_height}cm`, cls:'green'});
    if (item.skin_colors !== 'unknown' && item.skin_colors !== 'n/a') tags.push({text: item.skin_colors.split(',')[0], cls:'purple'});
  }

  return { name, desc: desc || 'Sin descripción adicional', tags: tags.slice(0,4), icon, image };
}

// ─── PAGINATION ───────────────────────────────────────────────────────────────
function renderPagination(page, total) {
  if (total <= 1) return '';
  let html = '<div class="pagination">';
  html += `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>◀ ANTERIOR</button>`;
  for (let i = Math.max(1,page-2); i <= Math.min(total,page+2); i++) {
    html += `<button class="page-btn${i===page?' current':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=total?'disabled':''}>SIGUIENTE ▶</button>`;
  html += `<span class="page-info">${page} / ${total}</span></div>`;
  return html;
}

function goPage(p) {
  currentPage = p;
  renderAPISection(currentSection);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function doSearch() {
  const val = document.getElementById('search-input').value.trim();
  searchQuery = val;
  currentPage = 1;
  renderAPISection(currentSection);
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function showDetail(item, section) {

  content.innerHTML = `<div class="loader-wrap"><div class="loader-ring"></div><div class="loader-text">Cargando registro...</div></div>`;

async function buildDetailHTML(item, section, info) {
  const imgHTML = info.image
    ? `<div class="modal-img-hero"><img src="${info.image}" alt="${info.name}" onerror="this.parentNode.innerHTML=''"><div class="modal-img-overlay"></div></div>`
    : `<div class="modal-header-placeholder"><span class="modal-header-icon">${info.icon}</span></div>`;

  let statsHTML = '', relatedHTML = '';

  if (section === 'people') {
    statsHTML = buildStats([
      ['Nombre',item.name],['Género',item.gender],['Nacimiento',item.birth_year],
      ['Altura',item.height+'cm'],['Masa',item.mass+'kg'],['Color ojos',item.eye_color],
      ['Color cabello',item.hair_color],['Color piel',item.skin_color],
    ]);
    if (item.films?.length) relatedHTML = buildRelated('Películas', item.films.length, 'films', '🎬');
    if (item.starships?.length) relatedHTML += buildRelated('Naves', item.starships.length, 'starships', '🚀');
  } else if (section === 'planets') {
    statsHTML = buildStats([
      ['Nombre',item.name],['Clima',item.climate],['Terreno',item.terrain],
      ['Diámetro',item.diameter+'km'],['Gravedad',item.gravity],['Período orbital',item.orbital_period+' días'],
      ['Período rotacional',item.rotation_period+' hrs'],['Agua superficial',item.surface_water+'%'],
      ['Población',parseInt(item.population)>0?parseInt(item.population).toLocaleString():item.population],
    ]);
  } else if (section === 'starships') {
    statsHTML = buildStats([
      ['Nombre',item.name],['Modelo',item.model],['Clase',item.starship_class],
      ['Fabricante',item.manufacturer],['Costo',item.cost_in_credits+' créditos'],
      ['Longitud',item.length+'m'],['Velocidad atm.',item.max_atmosphering_speed],
      ['Tripulación',item.crew],['Pasajeros',item.passengers],
      ['Capacidad carga',item.cargo_capacity],['Consumibles',item.consumables],
      ['Hiperpropulsión',item.hyperdrive_rating],['Clase MGLT',item.MGLT],
    ]);
  } else if (section === 'vehicles') {
    statsHTML = buildStats([
      ['Nombre',item.name],['Modelo',item.model],['Clase',item.vehicle_class],
      ['Fabricante',item.manufacturer],['Costo',item.cost_in_credits+' créditos'],
      ['Longitud',item.length+'m'],['Velocidad máx.',item.max_atmosphering_speed+'km/h'],
      ['Tripulación',item.crew],['Pasajeros',item.passengers],
      ['Capacidad carga',item.cargo_capacity],['Consumibles',item.consumables],
    ]);
  } else if (section === 'species') {
    statsHTML = buildStats([
      ['Nombre',item.name],['Clasificación',item.classification],['Designación',item.designation],
      ['Altura promedio',item.average_height+'cm'],['Expectativa de vida',item.average_lifespan+' años'],
      ['Colores de piel',item.skin_colors],['Colores de ojos',item.eye_colors],
      ['Colores de cabello',item.hair_colors],['Idioma',item.language],
    ]);
  }

  const loreDesc = getLoreDesc(item, section);

  return `
    ${imgHTML}
    <div class="modal-title-bar">
      <div class="modal-category">◈ ${section.toUpperCase()} — ARCHIVO GALÁCTICO</div>
      <div class="modal-title">${item.name || item.title}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${loreDesc ? `
        <div class="modal-section">
          <div class="modal-section-title">⟨ Descripción ⟩</div>
          <div class="modal-desc">${loreDesc}</div>
        </div>
      ` : ''}
      <div class="modal-section">
        <div class="modal-section-title">⟨ Especificaciones Técnicas ⟩</div>
        <div class="stat-grid">${statsHTML}</div>
      </div>
      ${relatedHTML ? `
        <div class="modal-section">
          <div class="modal-section-title">⟨ Vínculos ⟩</div>
          <div class="related-list">${relatedHTML}</div>
        </div>
      ` : ''}
      <div class="modal-section" style="border-top:1px solid var(--border);padding-top:16px;margin-top:4px">
        <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:2px">
          FUENTE: SWAPI.DEV · ACTUALIZADO: ${new Date().toLocaleDateString('es-AR')} · ID: ${item.url?.split('/').filter(Boolean).pop() || 'N/A'}
        </div>
      </div>
    </div>
  `;
}

function buildStats(pairs) {
  return pairs.filter(([,v]) => v && v !== 'unknown' && v !== 'n/a' && v !== 'undefinedcm')
    .map(([l,v]) => `
      <div class="stat-item">
        <div class="stat-label">${l}</div>
        <div class="stat-value">${v}</div>
      </div>
    `).join('');
}

function buildRelated(label, count, section, icon) {
  return `<span class="related-chip" onclick="navigate('${section}')">${icon} ${label} (${count})</span>`;
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── LOADER ───────────────────────────────────────────────────────────────────
function showLoader(msg) {
  document.getElementById('app').innerHTML = `
    <div class="loader-wrap">
      <div class="loader-ring"></div>
      <div class="loader-text">${msg || 'Accediendo a los archivos...'}</div>
    </div>
  `;
}

// ─── ERROR ────────────────────────────────────────────────────────────────────
function showError(err, section) {
  document.getElementById('app').innerHTML = `
    <div class="error-box">
      <div class="error-icon">⚠</div>
      <div class="error-title">Error de Conexión con los Archivos</div>
      <div class="error-msg">${err.message || 'No se pudo conectar con los servidores de SWAPI'}</div>
      <button class="retry-btn" onclick="renderSection('${section}')">↺ REINTENTAR</button>
    </div>
  `;
}
