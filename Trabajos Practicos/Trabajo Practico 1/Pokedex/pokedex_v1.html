<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokédex</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  /* ── Variables ─────────────────────────────────────────────── */
  :root {
    --red:    #e3350d;
    --red2:   #ff6b35;
    --dark:   #1a1a2e;
    --darker: #0f0f1a;
    --card:   #16213e;
    --card2:  #0d2137;
    --accent: #ffd700;
    --green:  #4caf50;
    --white:  #f0f4ff;
    --muted:  #8899bb;
    --radius: 14px;
    --pixel: 'Press Start 2P', monospace;
    --body: 'Nunito', sans-serif;

    /* type colors */
    --fire:     #ff6b35; --water:    #4db8ff; --grass:    #78c850;
    --electric: #ffd700; --psychic:  #ff6699; --ice:      #98d8d8;
    --dragon:   #7038f8; --dark-t:   #705848; --fairy:    #ff91d5;
    --normal:   #a8a878; --fighting: #c03028; --poison:   #a040a0;
    --ground:   #e0c068; --flying:   #a890f0; --bug:      #a8b820;
    --rock:     #b8a038; --ghost:    #705898; --steel:    #b8b8d0;
  }

  /* ── Reset ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--body);
    background: var(--darker);
    color: var(--white);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(227,53,13,.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(77,184,255,.12) 0%, transparent 55%);
  }

  /* ── Header ────────────────────────────────────────────────── */
  header {
    background: var(--red);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    border-bottom: 4px solid #a01800;
  }
  .header-inner {
    max-width: 1200px;
    margin: auto;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 64px;
    flex-wrap: wrap;
    padding: 8px 0;
  }
  .logo {
    font-family: var(--pixel);
    font-size: clamp(10px, 2vw, 14px);
    color: var(--accent);
    text-shadow: 2px 2px 0 #a01800;
    letter-spacing: -1px;
    flex-shrink: 0;
  }
  .logo span { color: #fff; }

  /* search + nav tabs */
  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    flex-wrap: wrap;
  }
  .search-box {
    position: relative;
    flex: 1;
    min-width: 160px;
  }
  .search-box input {
    width: 100%;
    padding: 8px 14px 8px 38px;
    border-radius: 99px;
    border: 2px solid rgba(255,255,255,.3);
    background: rgba(0,0,0,.3);
    color: #fff;
    font-family: var(--body);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box input::placeholder { color: rgba(255,255,255,.55); }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }

  .tab-btn {
    padding: 7px 16px;
    border-radius: 99px;
    border: 2px solid rgba(255,255,255,.35);
    background: transparent;
    color: rgba(255,255,255,.8);
    font-family: var(--body);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
  .tab-btn.active { background: var(--accent); color: var(--dark); border-color: var(--accent); }

  .fav-count {
    background: var(--dark);
    color: var(--accent);
    border-radius: 99px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 900;
    margin-left: 4px;
  }

  /* ── Main ──────────────────────────────────────────────────── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }
  .filter-label {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--muted);
    margin-right: 4px;
  }
  .type-pill {
    padding: 5px 13px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all .2s;
    text-transform: capitalize;
    background: rgba(255,255,255,.08);
    color: var(--white);
  }
  .type-pill:hover { transform: translateY(-1px); filter: brightness(1.2); }
  .type-pill.active { border-color: var(--accent); box-shadow: 0 0 10px rgba(255,215,0,.4); }

  /* grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  /* ── Card ──────────────────────────────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    border: 2px solid transparent;
    position: relative;
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.5); }
  .card.favorited { border-color: var(--accent); }

  .card-img-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px 16px 8px;
    background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.01));
    position: relative;
    min-height: 110px;
  }
  .card img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.5));
    transition: transform .25s;
  }
  .card:hover img { transform: scale(1.1) rotate(-3deg); }

  .fav-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    transition: transform .2s;
    z-index: 2;
  }
  .fav-btn:hover { transform: scale(1.3); }

  .card-body { padding: 10px 14px 14px; }
  .card-num {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .card-name {
    font-weight: 900;
    font-size: 15px;
    text-transform: capitalize;
    color: var(--white);
    margin-bottom: 8px;
  }
  .card-types { display: flex; gap: 5px; flex-wrap: wrap; }
  .type-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 99px;
    text-transform: capitalize;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.5);
  }

  /* ── Modal ─────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--card);
    border-radius: 20px;
    max-width: 480px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,.7);
    animation: slideUp .25s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 32px 20px 12px;
    min-height: 160px;
  }
  .modal-header img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,.6));
    z-index: 1;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,.4);
    border: none;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
    z-index: 2;
  }
  .modal-close:hover { background: rgba(255,255,255,.2); }
  .modal-fav {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(0,0,0,.4);
    border: none;
    font-size: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform .2s, background .2s;
    z-index: 2;
  }
  .modal-fav:hover { transform: scale(1.2); background: rgba(255,215,0,.2); }

  .modal-body { padding: 0 22px 24px; }
  .modal-num {
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 4px;
  }
  .modal-name {
    font-weight: 900;
    font-size: 26px;
    text-transform: capitalize;
    text-align: center;
    color: var(--white);
    margin-bottom: 10px;
  }
  .modal-types { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
  .modal-types .type-tag { font-size: 12px; padding: 5px 14px; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .info-box {
    background: rgba(255,255,255,.06);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .info-box .label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 4px;
  }
  .info-box .value {
    font-size: 16px;
    font-weight: 900;
    color: var(--white);
  }

  .section-title {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: .05em;
  }
  .stat-row { margin-bottom: 10px; }
  .stat-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
    text-transform: capitalize;
  }
  .stat-bar {
    height: 8px;
    border-radius: 99px;
    background: rgba(255,255,255,.1);
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .8s cubic-bezier(.4,0,.2,1);
  }

  .abilities-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .ability-tag {
    background: rgba(255,255,255,.1);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: capitalize;
  }

  /* ── Loading / Error / Empty ───────────────────────────────── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 80px 0;
  }
  .pokeball {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 5px solid var(--red);
    border-top-color: var(--red);
    border-right-color: var(--red);
    border-bottom-color: var(--white);
    border-left-color: var(--white);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader p {
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--muted);
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .error-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--red2);
  }
  .error-msg .emoji { font-size: 48px; display: block; margin-bottom: 14px; }
  .error-msg p { font-weight: 700; font-size: 15px; margin-bottom: 12px; }
  .retry-btn {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 99px;
    font-family: var(--body);
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  .retry-btn:hover { background: var(--red2); }

  .empty-msg {
    text-align: center;
    padding: 80px 20px;
  }
  .empty-msg .emoji { font-size: 56px; display: block; margin-bottom: 14px; }
  .empty-msg p { color: var(--muted); font-size: 15px; }

  /* load-more */
  .load-more-wrap {
    text-align: center;
    margin-top: 32px;
  }
  .load-more-btn {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 99px;
    font-family: var(--pixel);
    font-size: 9px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 0 #a01800;
  }
  .load-more-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #a01800; }
  .load-more-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a01800; }
  .load-more-btn:disabled { opacity: .5; cursor: default; transform: none; }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    border: 2px solid var(--accent);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 700;
    z-index: 999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--darker); }
  ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 99px; }

  /* responsive */
  @media (max-width: 520px) {
    .header-inner { height: auto; gap: 8px; }
    .logo { font-size: 9px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">Poké<span>DEX</span></div>
    <div class="header-controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar Pokémon…" autocomplete="off" />
      </div>
      <button class="tab-btn active" id="tabAll" onclick="switchTab('all')">Todos</button>
      <button class="tab-btn" id="tabFav" onclick="switchTab('favs')">
        ⭐ Favoritos <span class="fav-count" id="favCount">0</span>
      </button>
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<main>
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">TIPO:</span>
  </div>

  <!-- GRID -->
  <div class="grid" id="pokemonGrid"></div>

  <!-- LOAD MORE -->
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">CARGAR MÁS</button>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader">
      <button class="modal-fav" id="modalFavBtn" onclick="toggleFavModal()">⭐</button>
      <img id="modalImg" src="" alt="" />
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-num" id="modalNum"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-types" id="modalTypes"></div>
      <div class="info-grid">
        <div class="info-box">
          <div class="label">Altura</div>
          <div class="value" id="modalHeight">-</div>
        </div>
        <div class="info-box">
          <div class="label">Peso</div>
          <div class="value" id="modalWeight">-</div>
        </div>
        <div class="info-box">
          <div class="label">Exp. Base</div>
          <div class="value" id="modalExp">-</div>
        </div>
        <div class="info-box">
          <div class="label">Generación</div>
          <div class="value" id="modalGen">-</div>
        </div>
      </div>
      <div class="section-title">HABILIDADES</div>
      <div class="abilities-list" id="modalAbilities"></div>
      <div class="section-title">ESTADÍSTICAS</div>
      <div id="modalStats"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ────────────────────────────────────────────────────────────────
   CONSTANTS & STATE
──────────────────────────────────────────────────────────────── */
const API       = 'https://pokeapi.co/api/v2';
const PAGE_SIZE = 40;

const TYPE_COLORS = {
  fire:'#ff6b35',water:'#4db8ff',grass:'#78c850',electric:'#ffd700',
  psychic:'#ff6699',ice:'#98d8d8',dragon:'#7038f8',dark:'#705848',
  fairy:'#ff91d5',normal:'#a8a878',fighting:'#c03028',poison:'#a040a0',
  ground:'#e0c068',flying:'#a890f0',bug:'#a8b820',rock:'#b8a038',
  ghost:'#705898',steel:'#b8b8d0',
};
const STAT_COLORS = {
  hp:'#ff5959',attack:'#ff9900',defense:'#0099ff',
  'special-attack':'#d44bff','special-defense':'#33cc99',speed:'#ffcc00',
};

let allPokemon  = [];   // { id, name, types, sprite }
let favorites   = [];
let currentTab  = 'all';
let activeType  = 'all';
let searchQuery = '';
let offset      = 0;
let totalCount  = 0;
let loading     = false;
let currentModalId = null;

/* ────────────────────────────────────────────────────────────────
   LOCAL STORAGE
──────────────────────────────────────────────────────────────── */
function loadFavs() {
  try { favorites = JSON.parse(localStorage.getItem('pokedex_favs') || '[]'); }
  catch { favorites = []; }
}
function saveFavs() {
  try { localStorage.setItem('pokedex_favs', JSON.stringify(favorites)); }
  catch (e) { showToast('⚠️ No se pudo guardar'); }
}

/* ────────────────────────────────────────────────────────────────
   API
──────────────────────────────────────────────────────────────── */
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadPage(off) {
  const list = await fetchJSON(`${API}/pokemon?limit=${PAGE_SIZE}&offset=${off}`);
  totalCount = list.count;
  const details = await Promise.allSettled(
    list.results.map(p => fetchJSON(p.url))
  );
  return details
    .filter(r => r.status === 'fulfilled')
    .map(r => {
      const d = r.value;
      return {
        id:     d.id,
        name:   d.name,
        types:  d.types.map(t => t.type.name),
        sprite: d.sprites.other?.['official-artwork']?.front_default || d.sprites.front_default,
      };
    });
}

async function fetchDetail(id) {
  const [data, species] = await Promise.all([
    fetchJSON(`${API}/pokemon/${id}`),
    fetchJSON(`${API}/pokemon-species/${id}`).catch(() => null),
  ]);
  return { data, species };
}

/* ────────────────────────────────────────────────────────────────
   INIT
──────────────────────────────────────────────────────────────── */
async function init() {
  loadFavs();
  updateFavCount();
  buildTypeFilters();
  showLoader();
  try {
    const batch = await loadPage(0);
    allPokemon = batch;
    offset = PAGE_SIZE;
    render();
    updateLoadMore();
  } catch (e) {
    showError('No se pudo conectar con la PokéAPI. Revisá tu conexión.', init);
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    render();
  });
}

/* ────────────────────────────────────────────────────────────────
   RENDER
──────────────────────────────────────────────────────────────── */
function getVisible() {
  let src = currentTab === 'favs'
    ? allPokemon.filter(p => favorites.includes(p.id))
    : allPokemon;

  if (activeType !== 'all') src = src.filter(p => p.types.includes(activeType));
  if (searchQuery)          src = src.filter(p => p.name.includes(searchQuery) ||
                                                   String(p.id).includes(searchQuery));
  return src;
}

function render() {
  const grid = document.getElementById('pokemonGrid');
  const visible = getVisible();

  if (visible.length === 0) {
    grid.innerHTML = '';
    grid.insertAdjacentHTML('beforeend', emptyHTML());
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }

  grid.innerHTML = visible.map((p, i) => cardHTML(p, i)).join('');
  updateLoadMore();
}

function cardHTML(p, i) {
  const isFav = favorites.includes(p.id);
  const mainColor = TYPE_COLORS[p.types[0]] || '#888';
  const tags = p.types.map(t => `<span class="type-tag" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`).join('');
  return `
  <div class="card ${isFav ? 'favorited' : ''}" style="animation-delay:${Math.min(i*0.04,0.8)}s"
       onclick="openModal(${p.id})">
    <div class="card-img-wrap" style="background:linear-gradient(160deg,${mainColor}22,${mainColor}08)">
      <button class="fav-btn" onclick="event.stopPropagation();toggleFav(${p.id})"
        title="${isFav ? 'Quitar de favoritos' : 'Agregar a favoritos'}">
        ${isFav ? '⭐' : '🤍'}
      </button>
      ${p.sprite ? `<img src="${p.sprite}" alt="${p.name}" loading="lazy" />` : `<span style="font-size:48px">❓</span>`}
    </div>
    <div class="card-body">
      <div class="card-num">#${String(p.id).padStart(4,'0')}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-types">${tags}</div>
    </div>
  </div>`;
}

/* ────────────────────────────────────────────────────────────────
   FILTERS & TABS
──────────────────────────────────────────────────────────────── */
function buildTypeFilters() {
  const bar = document.getElementById('filterBar');
  const allTypes = ['all', ...Object.keys(TYPE_COLORS)];
  bar.innerHTML = `<span class="filter-label">TIPO:</span>` +
    allTypes.map(t => {
      const bg = t === 'all' ? 'rgba(255,255,255,.15)' : TYPE_COLORS[t];
      return `<button class="type-pill ${t==='all'?'active':''}"
        style="background:${bg}22;border-color:${t==='all'?'transparent':bg+'44'}"
        onclick="filterType('${t}')" data-type="${t}">${t==='all'?'Todos':t}</button>`;
    }).join('');
}

function filterType(type) {
  activeType = type;
  document.querySelectorAll('.type-pill').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').classList.toggle('active', tab==='all');
  document.getElementById('tabFav').classList.toggle('active', tab==='favs');
  document.getElementById('loadMoreWrap').style.display = tab === 'favs' ? 'none' : '';
  render();
}

/* ────────────────────────────────────────────────────────────────
   FAVORITES
──────────────────────────────────────────────────────────────── */
function toggleFav(id) {
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
    showToast('⭐ Agregado a favoritos');
  } else {
    favorites.splice(idx, 1);
    showToast('💔 Quitado de favoritos');
  }
  saveFavs();
  updateFavCount();
  render();
  // update modal button if open
  if (currentModalId === id) updateModalFavBtn();
}

function toggleFavModal() { if (currentModalId) toggleFav(currentModalId); }

function updateFavCount() {
  document.getElementById('favCount').textContent = favorites.length;
}

function updateModalFavBtn() {
  const btn = document.getElementById('modalFavBtn');
  btn.textContent = favorites.includes(currentModalId) ? '⭐' : '🤍';
}

/* ────────────────────────────────────────────────────────────────
   MODAL
──────────────────────────────────────────────────────────────── */
async function openModal(id) {
  currentModalId = id;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  // reset
  document.getElementById('modalImg').src = '';
  document.getElementById('modalName').textContent = 'Cargando…';
  document.getElementById('modalNum').textContent = '';
  document.getElementById('modalTypes').innerHTML = '';
  document.getElementById('modalStats').innerHTML = '<div style="color:var(--muted);font-size:13px">Cargando estadísticas…</div>';
  document.getElementById('modalAbilities').innerHTML = '';
  document.getElementById('modalHeight').textContent = '-';
  document.getElementById('modalWeight').textContent = '-';
  document.getElementById('modalExp').textContent = '-';
  document.getElementById('modalGen').textContent = '-';
  updateModalFavBtn();

  try {
    const { data, species } = await fetchDetail(id);
    const mainType = data.types[0].type.name;
    const color    = TYPE_COLORS[mainType] || '#888';

    document.getElementById('modalHeader').style.background =
      `linear-gradient(160deg, ${color}55, ${color}11)`;

    const sprite = data.sprites.other?.['official-artwork']?.front_default || data.sprites.front_default;
    document.getElementById('modalImg').src = sprite || '';
    document.getElementById('modalNum').textContent = `#${String(id).padStart(4,'0')}`;
    document.getElementById('modalName').textContent = data.name;

    document.getElementById('modalTypes').innerHTML =
      data.types.map(t => `<span class="type-tag" style="background:${TYPE_COLORS[t.type.name]||'#888'};font-size:13px;padding:5px 14px">${t.type.name}</span>`).join('');

    document.getElementById('modalHeight').textContent = `${(data.height/10).toFixed(1)} m`;
    document.getElementById('modalWeight').textContent = `${(data.weight/10).toFixed(1)} kg`;
    document.getElementById('modalExp').textContent    = data.base_experience ?? '—';

    if (species) {
      const genName = species.generation?.name?.replace('generation-','Gen ').toUpperCase() || '—';
      document.getElementById('modalGen').textContent = genName;
    }

    document.getElementById('modalAbilities').innerHTML =
      data.abilities.map(a => `<span class="ability-tag">${a.ability.name}${a.is_hidden?' <small style="opacity:.6">(oculta)</small>':''}</span>`).join('');

    const statsHTML = data.stats.map(s => {
      const name  = s.stat.name;
      const val   = s.base_stat;
      const pct   = Math.min(val / 255 * 100, 100);
      const col   = STAT_COLORS[name] || color;
      return `<div class="stat-row">
        <div class="stat-label"><span>${name}</span><span>${val}</span></div>
        <div class="stat-bar"><div class="stat-fill" style="width:0%;background:${col}" data-pct="${pct}"></div></div>
      </div>`;
    }).join('');
    document.getElementById('modalStats').innerHTML = statsHTML;

    // animate bars
    requestAnimationFrame(() => {
      document.querySelectorAll('.stat-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });

  } catch (e) {
    document.getElementById('modalName').textContent = 'Error al cargar';
    document.getElementById('modalStats').innerHTML =
      `<p style="color:var(--red2);font-size:13px">No se pudieron obtener los datos. Intentá de nuevo.</p>`;
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.body.style.overflow = '';
  currentModalId = null;
}
function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ────────────────────────────────────────────────────────────────
   LOAD MORE
──────────────────────────────────────────────────────────────── */
async function loadMore() {
  if (loading || offset >= totalCount) return;
  loading = true;
  const btn = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  btn.textContent = 'CARGANDO…';
  try {
    const batch = await loadPage(offset);
    allPokemon = [...allPokemon, ...batch];
    offset += PAGE_SIZE;
    render();
  } catch {
    showToast('⚠️ Error al cargar más Pokémon');
  }
  loading = false;
  btn.disabled = false;
  btn.textContent = 'CARGAR MÁS';
  updateLoadMore();
}

function updateLoadMore() {
  const wrap = document.getElementById('loadMoreWrap');
  wrap.style.display = (currentTab === 'all' && !searchQuery && activeType === 'all' && offset < totalCount) ? 'block' : 'none';
}

/* ────────────────────────────────────────────────────────────────
   UI HELPERS
──────────────────────────────────────────────────────────────── */
function showLoader() {
  document.getElementById('pokemonGrid').innerHTML =
    `<div class="loader" style="grid-column:1/-1">
      <div class="pokeball"></div>
      <p>Cargando Pokédex…</p>
    </div>`;
}

function showError(msg, retry) {
  document.getElementById('pokemonGrid').innerHTML =
    `<div class="error-msg" style="grid-column:1/-1">
      <span class="emoji">😵</span>
      <p>${msg}</p>
      <button class="retry-btn" onclick="(${retry.toString()})()">🔄 Reintentar</button>
    </div>`;
}

function emptyHTML() {
  return `<div class="empty-msg" style="grid-column:1/-1">
    <span class="emoji">${currentTab==='favs'?'💔':'🔎'}</span>
    <p>${currentTab==='favs'?'No tenés favoritos aún. ¡Explorá y agregá algunos! ⭐':'No se encontraron Pokémon con ese filtro.'}</p>
  </div>`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── Start ─────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
