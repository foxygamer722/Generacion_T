<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generación T - Proyectos</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
      color:white;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:50px 20px;
    }

    h1{
      font-size:3rem;
      margin-bottom:10px;
      text-align:center;
    }

    .subtitulo{
      color:#cbd5e1;
      margin-bottom:50px;
      text-align:center;
      font-size:1.1rem;
    }

    .contenedor{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
      gap:30px;
    }

    .card{
      background:rgba(30,41,59,.9);
      border-radius:20px;
      padding:35px;
      text-align:center;
      box-shadow:0 15px 30px rgba(0,0,0,.4);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 20px 40px rgba(59,130,246,.5);
    }

    .icono{
      font-size:5rem;
      margin-bottom:20px;
    }

    .card h2{
      margin-bottom:15px;
      font-size:2rem;
    }

    .card p{
      color:#cbd5e1;
      margin-bottom:25px;
    }

    .boton{
      display:block;
      text-decoration:none;
      background:#3b82f6;
      color:white;
      padding:14px;
      border-radius:10px;
      margin:10px 0;
      transition:.3s;
      font-weight:bold;
    }

    .boton:hover{
      background:#2563eb;
      transform:scale(1.03);
    }

    footer{
      margin-top:60px;
      color:#94a3b8;
      text-align:center;
    }
  </style>
</head>
<body>

  <h1>Generación T</h1>
  <p class="subtitulo">
    Paginas hechas
  </p>

  <div class="contenedor">

    <div class="card">
      <div class="icono">⚡</div>

      <h2>Pokédex</h2>

      <p>
        Aplicación para explorar Pokémon, ver información.
      </p>

      <a class="boton"
         href="TPS/TP01/Pokedex/Prompt%20Original/pokemon_v1.html">
         📖 Prompt Original
      </a>

      <a class="boton"
         href="TPS/TP01/Pokedex/Prompt%20Mejorado/pokedex_v2.html">
         ✨ Prompt Mejorada
      </a>
    </div>


    <div class="card">
      <div class="icono">🌌</div>

      <h2>Star Wars</h2>

      <p>
        Wiki interactiva del universo de Star Wars con personajes, películas y mucho más.
      </p>

      <a class="boton"
         href="TPS/TP01/Star%20Wars/Prompt%20Original/star_wars_v1.html">
         📖 Prompt Original
      </a>

      <a class="boton"
         href="TPS/TP01/Star%20Wars/Prompt%20Mejorado/star_wars_v2.html">
         ✨ Prompt Mejorada
      </a>
    </div>

  </div>

</body>
</html>
