<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéDex Retro</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #cc0000;
    --red-dark: #8b0000;
    --red-light: #ff4444;
    --cream: #f8f0d0;
    --cream-dark: #e8d898;
    --brown: #3d2b1f;
    --yellow: #f8c800;
    --yellow-dark: #c89800;
    --blue: #0044cc;
    --green: #00aa44;
    --gray: #888;
    --gray-light: #ccc;
    --shadow: 4px 4px 0px #00000088;
    --border: 3px solid var(--brown);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #1a0a0a;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, #2a0a0a 31px, #2a0a0a 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, #2a0a0a 31px, #2a0a0a 32px);
    font-family: 'Press Start 2P', monospace;
    color: var(--cream);
    min-height: 100vh;
    padding: 16px;
  }

  /* ── HEADER ── */
  header {
    background: var(--red);
    border: var(--border);
    border-bottom: 6px solid var(--red-dark);
    box-shadow: var(--shadow);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 4px, rgba(255,255,255,0.04) 4px, rgba(255,255,255,0.04) 8px
    );
    pointer-events: none;
  }

  .logo {
    font-size: clamp(14px, 3vw, 22px);
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--brown), -1px -1px 0 var(--yellow-dark);
    letter-spacing: 2px;
  }

  .logo span { color: #fff; }

  .header-lights {
    display: flex; gap: 8px; align-items: center;
  }
  .light {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--brown);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.4);
    animation: blink 2s infinite;
  }
  .light.blue  { background: #44aaff; animation-delay: 0s; }
  .light.red   { background: #ff4444; animation-delay: 0.4s; }
  .light.yellow{ background: var(--yellow); animation-delay: 0.8s; }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 0; margin-bottom: 0;
  }
  .tab-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 16px;
    background: var(--brown);
    color: var(--gray);
    border: var(--border);
    border-bottom: none;
    cursor: pointer;
    transition: all .1s;
    letter-spacing: 1px;
  }
  .tab-btn.active {
    background: var(--cream);
    color: var(--brown);
    border-bottom: 3px solid var(--cream);
    margin-bottom: -3px;
    z-index: 1;
  }
  .tab-btn:hover:not(.active) { background: #5a3f2f; color: var(--cream); }

  /* ── PANEL ── */
  .panel {
    background: var(--cream);
    border: var(--border);
    border-top: 6px solid var(--red);
    box-shadow: var(--shadow);
    padding: 20px;
    min-height: 500px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── SEARCH BAR ── */
  .search-bar {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .search-bar input {
    font-family: 'VT323', monospace;
    font-size: 22px;
    flex: 1; min-width: 160px;
    padding: 10px 14px;
    background: var(--brown);
    color: var(--yellow);
    border: 3px solid #5a3f2f;
    border-right: none;
    outline: none;
    caret-color: var(--yellow);
  }
  .search-bar input::placeholder { color: #7a6040; }
  .search-bar input:focus { border-color: var(--yellow); }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 14px;
    border: 3px solid var(--brown);
    border-bottom: 5px solid var(--brown);
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform .1s, border-bottom-width .1s;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(2px); border-bottom-width: 3px; }

  .btn-red    { background: var(--red);    color: #fff; }
  .btn-red:hover    { background: var(--red-light); }
  .btn-yellow { background: var(--yellow); color: var(--brown); }
  .btn-yellow:hover { background: var(--yellow-dark); }
  .btn-blue   { background: var(--blue);   color: #fff; }
  .btn-blue:hover   { background: #0055ff; }
  .btn-green  { background: var(--green);  color: #fff; }
  .btn-green:hover  { background: #00cc55; }
  .btn-gray   { background: var(--gray);   color: #fff; }
  .btn-gray:hover   { background: #666; }

  /* ── FILTER TYPES ── */
  .type-filters {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
  }
  .type-chip {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 5px 8px;
    border: 2px solid var(--brown);
    cursor: pointer;
    color: #fff;
    transition: opacity .15s, transform .1s;
    letter-spacing: 0.5px;
  }
  .type-chip:hover { opacity: .8; transform: translateY(-1px); }
  .type-chip.active { box-shadow: 0 0 0 2px var(--yellow); }

  /* ── GRID ── */
  .pokemon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .poke-card {
    background: var(--cream-dark);
    border: 3px solid var(--brown);
    border-bottom: 6px solid var(--brown);
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    animation: fadeIn .3s ease;
  }
  .poke-card:hover {
    transform: translateY(-4px);
    box-shadow: 6px 10px 0 rgba(0,0,0,0.4);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .poke-card .card-id {
    font-size: 7px; color: var(--gray); margin-bottom: 4px;
  }
  .poke-card img {
    width: 72px; height: 72px;
    image-rendering: pixelated;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3));
  }
  .poke-card .card-name {
    font-size: 8px;
    color: var(--brown);
    margin: 6px 0 6px;
    text-transform: capitalize;
  }
  .poke-card .card-types {
    display: flex; justify-content: center; gap: 4px; flex-wrap: wrap;
  }
  .type-badge {
    font-size: 6px;
    padding: 3px 6px;
    border: 1px solid rgba(0,0,0,0.3);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    text-transform: uppercase;
  }
  .fav-btn {
    position: absolute; top: 6px; right: 6px;
    background: none; border: none; cursor: pointer;
    font-size: 14px; line-height: 1;
    transition: transform .15s;
  }
  .fav-btn:hover { transform: scale(1.3); }

  /* ── LOAD MORE ── */
  .load-more-wrap {
    text-align: center; margin-top: 20px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--cream);
    border: var(--border);
    border-top: 8px solid var(--red);
    box-shadow: 8px 8px 0 var(--brown);
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: popIn .2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .modal-header {
    background: var(--red);
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h2 {
    font-size: clamp(10px, 2.5vw, 14px);
    color: var(--yellow);
    text-transform: capitalize;
    text-shadow: 2px 2px 0 var(--brown);
  }
  .modal-close {
    background: var(--brown); color: #fff;
    border: 2px solid #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px; cursor: pointer; padding: 4px 8px;
  }
  .modal-close:hover { background: #000; }

  .modal-body {
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 400px) { .modal-body { grid-template-columns: 1fr; } }

  .modal-sprite {
    text-align: center;
    background: var(--cream-dark);
    border: 2px solid var(--brown);
    padding: 12px;
  }
  .modal-sprite img {
    width: 120px; height: 120px;
    image-rendering: pixelated;
    filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.4));
  }
  .modal-sprite .poke-id { font-size: 8px; color: var(--gray); margin-top: 6px; }

  .modal-info { }
  .modal-info h3 {
    font-size: 8px; color: var(--red); margin-bottom: 10px;
    border-bottom: 2px solid var(--red); padding-bottom: 4px;
  }
  .info-row {
    display: flex; justify-content: space-between;
    font-family: 'VT323', monospace; font-size: 18px;
    color: var(--brown); margin-bottom: 4px;
    border-bottom: 1px dashed var(--gray-light); padding-bottom: 2px;
  }
  .info-row span:last-child { color: var(--red-dark); font-weight: bold; }

  .stat-bar-wrap { margin-bottom: 6px; }
  .stat-label {
    font-size: 6px; color: var(--brown); margin-bottom: 2px;
    display: flex; justify-content: space-between;
  }
  .stat-bar {
    height: 10px; background: var(--gray-light);
    border: 1px solid var(--brown);
    overflow: hidden;
  }
  .stat-fill {
    height: 100%; background: var(--green);
    transition: width .6s ease;
    border-right: 1px solid var(--brown);
  }

  .moves-list {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .move-chip {
    font-family: 'VT323', monospace; font-size: 14px;
    background: var(--brown); color: var(--yellow);
    padding: 2px 6px; border: 1px solid #000;
    text-transform: capitalize;
  }

  .modal-fav-btn {
    display: block; width: 100%;
    margin-top: 12px; padding: 10px;
  }

  /* ── FAVORITES EMPTY ── */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--gray);
  }
  .empty-state .pixel-icon { font-size: 40px; margin-bottom: 16px; }
  .empty-state p { font-size: 9px; line-height: 2; }

  /* ── COUNTER ── */
  .stats-bar {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px; font-family: 'VT323', monospace; font-size: 20px; color: var(--brown);
  }
  .stats-bar span { color: var(--red); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--brown); color: var(--yellow);
    font-family: 'Press Start 2P', monospace; font-size: 8px;
    padding: 10px 18px;
    border: 3px solid var(--yellow);
    box-shadow: 4px 4px 0 #000;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── LOADER ── */
  .loader {
    text-align: center; padding: 40px;
    font-size: 10px; color: var(--gray);
  }
  .loader::after {
    content: '';
    display: block; width: 40px; height: 40px;
    margin: 16px auto;
    border: 4px solid var(--gray-light);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-state {
    text-align: center; padding: 30px;
    background: #ffe0e0; border: 2px solid var(--red);
  }
  .error-state p { font-size: 9px; color: var(--red); line-height: 2; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--brown); }
  ::-webkit-scrollbar-thumb { background: var(--red); border: 1px solid var(--brown); }

  /* TYPE COLORS */
  .t-normal   { background:#A8A878; } .t-fire     { background:#F08030; }
  .t-water    { background:#6890F0; } .t-electric { background:#F8D030; }
  .t-grass    { background:#78C850; } .t-ice      { background:#98D8D8; }
  .t-fighting { background:#C03028; } .t-poison   { background:#A040A0; }
  .t-ground   { background:#E0C068; } .t-flying   { background:#A890F0; }
  .t-psychic  { background:#F85888; } .t-bug      { background:#A8B820; }
  .t-rock     { background:#B8A038; } .t-ghost    { background:#705898; }
  .t-dragon   { background:#7038F8; } .t-dark     { background:#705848; }
  .t-steel    { background:#B8B8D0; } .t-fairy    { background:#EE99AC; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .pokemon-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    .search-bar input { font-size: 18px; }
  }
  @media (max-width: 360px) {
    .pokemon-grid { grid-template-columns: repeat(2, 1fr); }
    .tab-btn { font-size: 7px; padding: 8px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">POKÉ<span>DEX</span> <span style="color:#fff;font-size:0.6em">RETRO</span></div>
  <div class="header-lights">
    <div class="light blue"></div>
    <div class="light red"></div>
    <div class="light yellow"></div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="explorer">▶ EXPLORAR</button>
  <button class="tab-btn" data-tab="favorites">★ FAVORITOS</button>
</div>

<div class="panel">
  <!-- EXPLORAR -->
  <div id="tab-explorer" class="tab-content active">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Buscar pokémon..." maxlength="30">
      <button class="btn btn-red" id="btn-search">BUSCAR</button>
      <button class="btn btn-gray" id="btn-clear">✕</button>
    </div>
    <div class="type-filters" id="type-filters"></div>
    <div class="stats-bar" id="stats-bar"></div>
    <div id="pokemon-grid" class="pokemon-grid"></div>
    <div class="load-more-wrap">
      <button class="btn btn-yellow" id="btn-load-more" style="display:none">▼ CARGAR MÁS</button>
    </div>
  </div>

  <!-- FAVORITOS -->
  <div id="tab-favorites" class="tab-content">
    <div id="favorites-grid" class="pokemon-grid"></div>
    <div id="favorites-empty" class="empty-state" style="display:none">
      <div class="pixel-icon">⭐</div>
      <p>¡No tenés favoritos!<br>Hacé click en ★ en cualquier<br>Pokémon para guardarlo.</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title">—</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="loader">CARGANDO</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ─── CONFIG ─── */
const API = 'https://pokeapi.co/api/v2';
const PAGE_SIZE = 24;
const TYPES = ['fire','water','grass','electric','ice','fighting','poison','ground',
               'flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy','normal'];

/* ─── STATE ─── */
let state = {
  allPokemon: [],      // {id, name} list
  displayed: [],       // currently shown cards data
  offset: 0,
  search: '',
  typeFilter: '',
  favorites: loadFavorites(),
  cache: {}            // name → full data
};

/* ─── STORAGE ─── */
function loadFavorites() {
  try { return JSON.parse(localStorage.getItem('pokedex_favs') || '[]'); }
  catch { return []; }
}
function saveFavorites() {
  try { localStorage.setItem('pokedex_favs', JSON.stringify(state.favorites)); }
  catch(e) { showToast('Error al guardar :('); }
}
function isFav(name) { return state.favorites.some(f => f.name === name); }
function toggleFav(poke) {
  if (isFav(poke.name)) {
    state.favorites = state.favorites.filter(f => f.name !== poke.name);
    showToast(`${poke.name.toUpperCase()} eliminado de favoritos`);
  } else {
    state.favorites.push({ name: poke.name, id: poke.id, sprite: poke.sprite, types: poke.types });
    showToast(`★ ${poke.name.toUpperCase()} agregado!`);
  }
  saveFavorites();
  refreshFavStars();
  if (document.getElementById('tab-favorites').classList.contains('active')) renderFavorites();
}

/* ─── FETCH ─── */
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function getPokemonData(name) {
  if (state.cache[name]) return state.cache[name];
  const data = await fetchJSON(`${API}/pokemon/${name}`);
  const poke = {
    id: data.id,
    name: data.name,
    sprite: data.sprites.versions?.['generation-v']?.['black-white']?.animated?.front_default
            || data.sprites.front_default
            || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${data.id}.png`,
    types: data.types.map(t => t.type.name),
    height: data.height,
    weight: data.weight,
    stats: data.stats.map(s => ({ name: s.stat.name, base: s.base_stat })),
    moves: data.moves.slice(0,8).map(m => m.move.name),
    base_experience: data.base_experience
  };
  state.cache[name] = poke;
  return poke;
}

/* ─── INIT ─── */
async function init() {
  showGridLoader();
  buildTypeFilters();
  try {
    const data = await fetchJSON(`${API}/pokemon?limit=898`);
    state.allPokemon = data.results.map((p, i) => ({ name: p.name, id: i+1 }));
    await loadCards(true);
  } catch(e) {
    showGridError('No se pudo conectar a la PokeAPI. Revisá tu conexión.');
  }
}

/* ─── FILTER & LOAD ─── */
function getFiltered() {
  return state.allPokemon.filter(p => {
    const matchSearch = !state.search || p.name.includes(state.search.toLowerCase());
    return matchSearch;
  });
}

async function loadCards(reset = false) {
  if (reset) {
    state.offset = 0;
    state.displayed = [];
    document.getElementById('pokemon-grid').innerHTML = '';
  }

  const filtered = getFiltered();
  const slice = filtered.slice(state.offset, state.offset + PAGE_SIZE);
  state.offset += slice.length;

  if (slice.length === 0 && state.offset === 0) {
    document.getElementById('pokemon-grid').innerHTML =
      `<div class="error-state" style="grid-column:1/-1"><p>No se encontró ningún Pokémon.</p></div>`;
    updateStatsBar(0, filtered.length);
    document.getElementById('btn-load-more').style.display = 'none';
    return;
  }

  const promises = slice.map(p => getPokemonData(p.name).catch(() => null));
  const results = await Promise.all(promises);

  // type filter applied after fetch
  let toShow = results.filter(Boolean);
  if (state.typeFilter) toShow = toShow.filter(p => p.types.includes(state.typeFilter));

  toShow.forEach(p => {
    state.displayed.push(p);
    renderCard(p);
  });

  updateStatsBar(state.displayed.length, filtered.length);
  const hasMore = state.offset < filtered.length;
  document.getElementById('btn-load-more').style.display = hasMore ? 'block' : 'none';
}

/* ─── RENDER CARD ─── */
function renderCard(poke) {
  const grid = document.getElementById('pokemon-grid');
  const card = document.createElement('div');
  card.className = 'poke-card';
  card.dataset.name = poke.name;

  const typeBadges = poke.types.map(t =>
    `<span class="type-badge t-${t}">${t}</span>`).join('');
  const favIcon = isFav(poke.name) ? '★' : '☆';
  const favColor = isFav(poke.name) ? '#f8c800' : '#aaa';

  card.innerHTML = `
    <button class="fav-btn" title="Favorito" style="color:${favColor}">${favIcon}</button>
    <div class="card-id">#${String(poke.id).padStart(3,'0')}</div>
    <img src="${poke.sprite}" alt="${poke.name}" loading="lazy"
         onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png'">
    <div class="card-name">${poke.name}</div>
    <div class="card-types">${typeBadges}</div>
  `;

  card.querySelector('.fav-btn').addEventListener('click', e => {
    e.stopPropagation();
    toggleFav(poke);
  });
  card.addEventListener('click', () => openModal(poke.name));
  grid.appendChild(card);
}

/* ─── FAV STARS REFRESH ─── */
function refreshFavStars() {
  document.querySelectorAll('.poke-card').forEach(card => {
    const name = card.dataset.name;
    const btn = card.querySelector('.fav-btn');
    if (!btn) return;
    const fav = isFav(name);
    btn.textContent = fav ? '★' : '☆';
    btn.style.color = fav ? '#f8c800' : '#aaa';
  });
}

/* ─── RENDER FAVORITES ─── */
function renderFavorites() {
  const grid = document.getElementById('favorites-grid');
  const empty = document.getElementById('favorites-empty');
  grid.innerHTML = '';
  if (state.favorites.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  state.favorites.forEach(p => renderCard(p));
}

/* ─── MODAL ─── */
async function openModal(name) {
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  const title = document.getElementById('modal-title');
  overlay.classList.add('open');
  title.textContent = name;
  body.innerHTML = '<div class="loader">CARGANDO</div>';

  try {
    const poke = await getPokemonData(name);
    title.textContent = `${poke.name} #${String(poke.id).padStart(3,'0')}`;

    const typeBadges = poke.types.map(t =>
      `<span class="type-badge t-${t}" style="font-size:8px;padding:4px 8px">${t}</span>`).join('');

    const statColors = { hp:'#ff4444', attack:'#f08030', defense:'#6890f0',
      'special-attack':'#f85888', 'special-defense':'#78c850', speed:'#f8d030' };

    const statBars = poke.stats.map(s => {
      const pct = Math.min(100, Math.round(s.base / 255 * 100));
      const color = statColors[s.name] || '#78c850';
      return `<div class="stat-bar-wrap">
        <div class="stat-label"><span>${s.name.replace('special-','sp.')}</span><span>${s.base}</span></div>
        <div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');

    const moves = poke.moves.map(m =>
      `<span class="move-chip">${m.replace(/-/g,' ')}</span>`).join('');

    const isFavorite = isFav(poke.name);

    body.innerHTML = `
      <div class="modal-sprite">
        <img src="${poke.sprite}" alt="${poke.name}"
             onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png'">
        <div class="poke-id">#${String(poke.id).padStart(3,'0')}</div>
        <div style="display:flex;justify-content:center;gap:4px;margin-top:8px">${typeBadges}</div>
        <button class="btn ${isFavorite?'btn-yellow':'btn-gray'} modal-fav-btn" id="modal-fav-btn">
          ${isFavorite ? '★ FAVORITO' : '☆ AGREGAR'}
        </button>
      </div>
      <div class="modal-info">
        <h3>DATOS</h3>
        <div class="info-row"><span>Altura</span><span>${(poke.height/10).toFixed(1)} m</span></div>
        <div class="info-row"><span>Peso</span><span>${(poke.weight/10).toFixed(1)} kg</span></div>
        <div class="info-row"><span>EXP base</span><span>${poke.base_experience || '—'}</span></div>
        <h3 style="margin-top:12px">ESTADÍSTICAS</h3>
        ${statBars}
        <h3 style="margin-top:12px">ATAQUES</h3>
        <div class="moves-list">${moves}</div>
      </div>
    `;

    document.getElementById('modal-fav-btn').addEventListener('click', () => {
      toggleFav(poke);
      const btn = document.getElementById('modal-fav-btn');
      const nowFav = isFav(poke.name);
      btn.textContent = nowFav ? '★ FAVORITO' : '☆ AGREGAR';
      btn.className = `btn ${nowFav?'btn-yellow':'btn-gray'} modal-fav-btn`;
    });

  } catch(e) {
    body.innerHTML = `<div class="error-state" style="grid-column:1/-1">
      <p>Error al cargar los datos.<br>Intentá de nuevo.</p>
    </div>`;
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

/* ─── TYPE FILTERS ─── */
function buildTypeFilters() {
  const wrap = document.getElementById('type-filters');
  const all = document.createElement('button');
  all.className = 'type-chip active';
  all.style.background = '#555';
  all.textContent = 'TODOS';
  all.addEventListener('click', () => setTypeFilter('', all));
  wrap.appendChild(all);

  TYPES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `type-chip t-${t}`;
    btn.textContent = t.toUpperCase();
    btn.addEventListener('click', () => setTypeFilter(t, btn));
    wrap.appendChild(btn);
  });
}

function setTypeFilter(type, el) {
  state.typeFilter = type;
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  loadCards(true);
}

/* ─── SEARCH ─── */
function doSearch() {
  state.search = document.getElementById('search-input').value.trim();
  loadCards(true);
}

/* ─── STATS BAR ─── */
function updateStatsBar(shown, total) {
  document.getElementById('stats-bar').innerHTML =
    `Mostrando <span>${shown}</span> de <span>${total}</span> Pokémon
     &nbsp;|&nbsp; ★ Favoritos: <span>${state.favorites.length}</span>`;
}

/* ─── LOADERS ─── */
function showGridLoader() {
  document.getElementById('pokemon-grid').innerHTML = '<div class="loader" style="grid-column:1/-1">CARGANDO POKÉDEX</div>';
}
function showGridError(msg) {
  document.getElementById('pokemon-grid').innerHTML =
    `<div class="error-state" style="grid-column:1/-1"><p>${msg}</p><br>
     <button class="btn btn-red" onclick="init()">REINTENTAR</button></div>`;
}

/* ─── TOAST ─── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─── EVENTS ─── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const id = `tab-${btn.dataset.tab}`;
    document.getElementById(id).classList.add('active');
    if (btn.dataset.tab === 'favorites') renderFavorites();
  });
});

document.getElementById('btn-search').addEventListener('click', doSearch);
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  state.search = '';
  loadCards(true);
});
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('btn-load-more').addEventListener('click', () => loadCards(false));
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ─── START ─── */
init();
</script>
</body>
</html>
